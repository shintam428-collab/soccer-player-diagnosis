<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>運営者情報 | サッカー診断サイト</title>
<style>
*, *::before, *::after{box-sizing:border-box;}
html,body{width:100%;max-width:100%;margin:0;overflow-x:hidden;}
body{font-family:Arial,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;color:#0f172a;background:#f4f7fb;line-height:1.9;}
.legal-page{width:min(100%,920px);margin:0 auto;padding:48px 20px 28px;}
.legal-card{background:rgba(255,255,255,0.94);border:1px solid #e2e8f0;border-radius:24px;box-shadow:0 14px 34px rgba(15,23,42,0.1);padding:38px 34px;}
.legal-title{margin:0 0 10px;font-size:clamp(30px,6vw,46px);font-weight:900;line-height:1.25;color:#0f172a;}
.legal-lead{margin:0 0 28px;color:#475569;font-weight:700;}
.info-list{display:grid;gap:14px;margin:0;padding:0;}
.info-row{display:grid;grid-template-columns:180px 1fr;gap:14px;padding:16px;border-radius:16px;background:#f8fafc;border:1px solid #e2e8f0;}
.info-row dt{font-weight:900;color:#1e3a8a;}
.info-row dd{margin:0;font-weight:700;color:#334155;}
.legal-footer{margin-top:26px;text-align:center;color:#64748b;font-size:13px;font-weight:700;}
.legal-footer__links{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:12px;}
.legal-footer a{color:#2563eb;font-weight:900;text-decoration:none;}
.legal-footer a:hover{text-decoration:underline;}
@media(max-width:600px){.legal-page{padding:28px 12px 20px;}.legal-card{padding:26px 18px;border-radius:18px;}.info-row{grid-template-columns:1fr;gap:4px;padding:14px;}.legal-footer__links{gap:10px 12px;}}
</style>
</head>
<body>
<main class="legal-page">
    <article class="legal-card">
        <h1 class="legal-title">運営者情報</h1>
        <p class="legal-lead">本サイトの運営情報は以下のとおりです。</p>

        <dl class="info-list">
            <div class="info-row">
                <dt>サイト名</dt>
                <dd>サッカー診断サイト</dd>
            </div>
            <div class="info-row">
                <dt>運営者</dt>
                <dd>サッカー診断サイト運営者</dd>
            </div>
            <div class="info-row">
                <dt>運営目的</dt>
                <dd>サッカーの能力やプレースタイルを診断できるサービスの提供</dd>
            </div>
        </dl>
    </article>

    <footer class="legal-footer">
        <nav class="legal-footer__links" aria-label="フッターリンク">
            <a href="privacy.html">プライバシーポリシー</a>
            <a href="disclaimer.html">免責事項</a>
            <a href="operator.html">運営者情報</a>
            <a href="contact.html">お問い合わせ</a>
        </nav>
        <a href="index.html">トップページへ戻る</a>
    </footer>
</main>
</body>
</html>
