<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>あなたが目指すべき選手診断</title>
</head>
<body>

<h1>あなたが目指すべき選手診断</h1>

<p id="question">Q1 試合で一番楽しい瞬間は？</p>

<button onclick="answer('A')">味方への決定的なパス</button>
<button onclick="answer('B')">相手を抜く瞬間</button>
<button onclick="answer('C')">ゴールを決める瞬間</button>
<button onclick="answer('D')">ボールを奪う瞬間</button>

<p id="result"></p>

<script>

let step = 1;

let pass = 0;
let dribble = 0;
let shoot = 0;
let defense = 0;

function answer(choice){

    if(step === 1){

        if(choice === "A") pass += 3;
        if(choice === "B") dribble += 3;
        if(choice === "C") shoot += 3;
        if(choice === "D") defense += 3;

        document.getElementById("question").innerText =
        "Q2 チームで任されたい役割は？";

        step = 2;

    }else{

        if(choice === "A") pass += 3;
        if(choice === "B") dribble += 3;
        if(choice === "C") shoot += 3;
        if(choice === "D") defense += 3;

        document.getElementById("question").innerText =
        "診断終了";

        document.getElementById("result").innerText =
        "パス：" + pass +
        "　ドリブル：" + dribble +
        "　シュート：" + shoot +
        "　守備：" + defense;
    }
}

</script>

</body>
</html>
