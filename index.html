<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あなたが目指すべき選手診断</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#0f9b0f,#006400);color:white;text-align:center;padding:20px}
.card{background:white;color:black;max-width:800px;margin:auto;padding:20px;border-radius:15px}
button{display:block;width:90%;max-width:500px;margin:10px auto;padding:15px;border:none;border-radius:10px;font-size:18px;cursor:pointer}
#result{margin-top:20px}
canvas{background:white;border-radius:15px;margin-top:20px}
</style>
</head>
<body>
<h1>⚽ あなたが目指すべき選手診断 ⚽</h1>

<div class="card">
<h2 id="question"></h2>
<div id="choices"></div>
<div id="result"></div>
</div>

<canvas id="radarChart"></canvas>

<script>
const questions=[
{q:"試合で一番楽しい瞬間は？",c:["味方への決定的なパス","相手を抜く瞬間","ゴールを決める瞬間","ボールを奪う瞬間"]},
{q:"チームで任されたい役割は？",c:["ゲームメイカー","チャンスメイカー","エースストライカー","守備の中心"]},
{q:"成長させたい能力は？",c:["視野・パス","ドリブル","決定力","守備力"]},
{q:"サッカーで一番大切なのは？",c:["チームを動かす","個で打開する","得点を取る","失点を防ぐ"]},
{q:"同点の終盤でボールを持ったら？",c:["味方を活かす","仕掛ける","ゴールを狙う","ボールを失わない"]},
{q:"監督から褒められたいのは？",c:["判断力","技術力","得点力","守備力"]},
{q:"好きな練習は？",c:["パス練習","ドリブル練習","シュート練習","守備練習"]},
{q:"チームメイトから言われたい言葉は？",c:["試合を作ってくれる","何かしてくれそう","点を取ってくれる","安心して任せられる"]},
{q:"理想の選手像は？",c:["チームを支配する選手","観客を沸かせる選手","ゴールを量産する選手","チームを支える選手"]},
{q:"能力を一つ伸ばせるなら？",c:["戦術理解・視野","ドリブル技術","シュート技術","守備能力"]}
];

const scores={
Q1:{A:[3,0,0,0,0,1],B:[0,3,0,0,0,0],C:[0,0,3,0,0,0],D:[0,0,0,3,1,0]},
Q2:{A:[3,0,0,0,0,2],B:[0,3,0,0,0,0],C:[0,0,3,0,0,1],D:[0,0,0,3,1,2]},
Q3:{A:[3,0,0,0,0,1],B:[0,3,0,0,0,0],C:[0,0,3,0,0,0],D:[0,0,0,3,1,0]},
Q4:{A:[2,0,0,0,0,2],B:[0,3,0,0,0,0],C:[0,0,3,0,0,0],D:[0,0,0,3,1,1]},
Q5:{A:[3,0,0,0,0,1],B:[0,3,0,0,0,0],C:[0,0,3,0,0,0],D:[0,0,0,2,1,1]},
Q6:{A:[2,0,0,0,0,2],B:[0,3,0,0,0,0],C:[0,0,3,0,0,0],D:[0,0,0,3,1,0]},
Q7:{A:[3,0,0,0,0,0],B:[0,3,0,0,0,0],C:[0,0,3,0,0,0],D:[0,0,0,3,1,0]},
Q8:{A:[3,0,0,0,0,1],B:[0,3,0,0,0,0],C:[0,0,3,0,0,0],D:[0,0,0,3,1,1]},
Q9:{A:[3,0,0,0,0,2],B:[0,3,0,0,0,0],C:[0,0,3,0,0,0],D:[0,0,0,3,1,2]},
Q10:{A:[3,0,0,0,0,1],B:[0,3,0,0,0,0],C:[0,0,3,0,0,0],D:[0,0,0,3,1,0]}
};

const players={
"デブライネ":[10,7,8,5,8,8],
"ハーランド":[4,6,10,4,7,6],
"ファンダイク":[5,4,4,10,7,9],
"ヴィニシウス":[5,10,8,4,8,6],
"カンテ":[6,5,4,10,10,7]
};

const descriptions={
"デブライネ":"高い視野と正確なパスで試合を支配する司令塔。味方を活かすプレーを得意とし、ゲームメイク能力に優れている。",
"ヴィニシウス":"高いドリブル能力と突破力を持つアタッカー。1対1で相手を抜く力に優れ、積極的な仕掛けで試合の流れを変えることができる。",
"ハーランド":"圧倒的な得点力を持つストライカー。ゴール前での決定力が高く、チームの得点源として活躍する。",
"ファンダイク":"守備力とリーダーシップに優れたディフェンダー。冷静な判断と統率力でチームを支える存在である。",
"カンテ":"豊富な運動量でチームを支える守備的ミッドフィルダー。ボール奪取能力が高い。"
};

let idx=0;
let me=[0,0,0,0,0,0];

function render(){
 document.getElementById("question").innerText="Q"+(idx+1)+" "+questions[idx].q;
 let html="";
 ["A","B","C","D"].forEach((k,i)=>{
   html+=`<button onclick="answer('${k}')">${questions[idx].c[i]}</button>`;
 });
 document.getElementById("choices").innerHTML=html;
}
function answer(ch){
 const add=scores["Q"+(idx+1)][ch];
 me=me.map((v,i)=>v+add[i]);
 idx++;
 if(idx<questions.length){render(); return;}
 finish();
}
function finish(){
 document.getElementById("choices").innerHTML="";
 document.getElementById("question").innerText="診断結果";
 let best="",bestDist=1e9;
 for(const [name,val] of Object.entries(players)){
   let d=0;
   for(let i=0;i<6;i++) d+=(me[i]-val[i])**2;
   if(d<bestDist){bestDist=d;best=name;}
 }
 document.getElementById("result").innerHTML=`
 <h2>🏆 あなたが目指すべき選手は ${best} です！</h2>
 <p>${descriptions[best]}</p>`;

 new Chart(document.getElementById('radarChart'),{
 type:'radar',
 data:{
 labels:['パス','ドリブル','シュート','守備','運動量','リーダーシップ'],
 datasets:[
 {label:'あなた',data:me},
 {label:best,data:players[best]}
 ]}
 });
}
render();
</script>
</body>
</html>
