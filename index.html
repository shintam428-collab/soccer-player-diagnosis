<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>あなたが目指すべきサッカー選手診断</title>
</head>
<body>

<h1>あなたが目指すべきサッカー選手診断</h1>

<p>Q1 試合で一番楽しい瞬間は？</p>

<input type="radio" name="q1" value="pass"> パス
<input type="radio" name="q1" value="dribble"> ドリブル
<input type="radio" name="q1" value="shoot"> ゴール
<input type="radio" name="q1" value="defense"> ボール奪取

<button onclick="result()">診断する</button>

<p id="answer"></p>

<script>
function result() {

    let choice = document.querySelector('input[name="q1"]:checked');

    if (!choice) {
        document.getElementById("answer").innerHTML =
        "選択肢を選んでください";
        return;
    }

    let player = "";

    if (choice.value === "pass") {
        player = "デブライネ";
    }
    else if (choice.value === "dribble") {
        player = "ヴィニシウス";
    }
    else if (choice.value === "shoot") {
        player = "ハーランド";
    }
    else {
        player = "カンテ";
    }

    document.getElementById("answer").innerHTML =
    "あなたが目指すべき選手は" + player + "です！";
}
</script>
