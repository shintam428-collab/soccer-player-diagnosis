<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>あなたが目指すべき選手診断</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f9b0f,#006400);
    color:white;
    text-align:center;
    padding:20px;
    min-height:100vh;
}

h1{
    font-size:36px;
    margin-bottom:10px;
}

.card{
    background:white;
    color:black;
    max-width:800px;
    margin:20px auto;
    padding:25px;
    border-radius:18px;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

#question{
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}

button{
    display:block;
    width:90%;
    max-width:500px;
    margin:12px auto;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    color:white;
}

button:hover{
    transform:scale(1.04);
}

button:nth-child(1){
    background:#3498db;
}

button:nth-child(2){
    background:#e67e22;
}

button:nth-child(3){
    background:#e74c3c;
}

button:nth-child(4){
    background:#2c3e50;
}

#result{
    margin-top:20px;
    font-size:18px;
    line-height:1.7;
}

.player-img{
    width:280px;
    max-width:90%;
    border-radius:18px;
    margin:18px auto;
    display:block;
    box-shadow:0 8px 25px rgba(0,0,0,0.35);
}

.training-list{
    display:inline-block;
    text-align:left;
    margin:10px auto 20px;
    font-size:18px;
    line-height:1.8;
}

.result-hero{
    background:linear-gradient(135deg,#111827,#064e3b);
    color:white;
    padding:25px;
    border-radius:20px;
    margin-top:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

.result-badge{
    display:inline-block;
    background:#facc15;
    color:#111827;
    padding:6px 16px;
    border-radius:999px;
    font-weight:bold;
    margin-bottom:10px;
}

.result-title{
    font-size:28px;
    margin:10px 0;
}

.result-title span{
    font-size:38px;
    color:#facc15;
}

.result-description{
    background:rgba(255,255,255,0.12);
    padding:15px;
    border-radius:12px;
    line-height:1.8;
}

.section-card{
    background:#f8fafc;
    border-radius:16px;
    padding:18px;
    margin-top:18px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.ability-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    margin-top:15px;
}

.ability-item{
    background:white;
    border-radius:12px;
    padding:12px;
    text-align:left;
    box-shadow:0 3px 10px rgba(0,0,0,0.12);
}

.ability-name{
    font-weight:bold;
    margin-bottom:6px;
}

.ability-bar{
    background:#e5e7eb;
    border-radius:999px;
    height:10px;
    overflow:hidden;
}

.ability-bar-fill{
    background:linear-gradient(90deg,#22c55e,#3b82f6);
    height:100%;
}

.training-list li{
    background:white;
    margin:8px 0;
    padding:10px 14px;
    border-radius:10px;
    box-shadow:0 3px 8px rgba(0,0,0,0.12);
}

.result-hero{
    background:linear-gradient(135deg,#111827,#064e3b);
    color:white;
    padding:25px;
    border-radius:20px;
    margin-top:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

.result-badge{
    display:inline-block;
    background:#facc15;
    color:#111827;
    padding:6px 16px;
    border-radius:999px;
    font-weight:bold;
    margin-bottom:10px;
}

.result-title{
    font-size:28px;
    margin:10px 0;
}

.result-title span{
    font-size:38px;
    color:#facc15;
}

.result-description{
    background:rgba(255,255,255,0.12);
    padding:15px;
    border-radius:12px;
    line-height:1.8;
}

.section-card{
    background:#f8fafc;
    border-radius:16px;
    padding:18px;
    margin-top:18px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.ability-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    margin-top:15px;
}

.ability-item{
    background:white;
    border-radius:12px;
    padding:12px;
    text-align:left;
    box-shadow:0 3px 10px rgba(0,0,0,0.12);
}

.ability-name{
    font-weight:bold;
    margin-bottom:6px;
}

.ability-bar{
    background:#e5e7eb;
    border-radius:999px;
    height:10px;
    overflow:hidden;
}

.ability-bar-fill{
    background:linear-gradient(90deg,#22c55e,#3b82f6);
    height:100%;
}

.training-list li{
    background:white;
    margin:8px 0;
    padding:10px 14px;
    border-radius:10px;
    box-shadow:0 3px 8px rgba(0,0,0,0.12);
}

@media(max-width:600px){
    .ability-grid{
        grid-template-columns:1fr;
    }

    .result-title span{
        font-size:32px;
    }
}
    
.chart-box{
    background:white;
    max-width:800px;
    margin:25px auto;
    padding:20px;
    border-radius:18px;
    display:none;
}

canvas{
    max-width:100%;
}

@media(max-width:600px){
    h1{
        font-size:28px;
    }

    #question{
        font-size:20px;
    }

    button{
        font-size:16px;
    }
}

    .hero{
    max-width:900px;
    margin:0 auto 25px;
    padding:30px 20px;
    border-radius:24px;
    background:linear-gradient(135deg,rgba(17,24,39,0.9),rgba(6,78,59,0.9));
    box-shadow:0 12px 35px rgba(0,0,0,0.35);
}

.hero-badge{
    display:inline-block;
    background:#facc15;
    color:#111827;
    padding:7px 18px;
    border-radius:999px;
    font-weight:bold;
    font-size:14px;
    letter-spacing:1px;
}

.hero h1{
    margin:15px 0 10px;
    font-size:42px;
}

.hero-text{
    font-size:18px;
    line-height:1.8;
    margin:10px auto 20px;
}

.hero-points{
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
}

.hero-points div{
    background:rgba(255,255,255,0.15);
    padding:10px 16px;
    border-radius:999px;
    font-weight:bold;
}

.progress-area{
    margin-bottom:20px;
}

#progressText{
    text-align:left;
    font-weight:bold;
    color:#166534;
    margin-bottom:8px;
}

.progress-bar{
    width:100%;
    height:12px;
    background:#e5e7eb;
    border-radius:999px;
    overflow:hidden;
}

#progressFill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#22c55e,#3b82f6);
    border-radius:999px;
    transition:0.3s;
}

.choice-btn{
    background:white !important;
    color:#111827 !important;
    border:2px solid #e5e7eb;
    display:flex;
    align-items:center;
    gap:14px;
    text-align:left;
    box-shadow:0 5px 15px rgba(0,0,0,0.12);
}

.choice-btn:hover{
    border-color:#22c55e;
    background:#f0fdf4 !important;
}

.choice-label{
    background:#16a34a;
    color:white;
    width:34px;
    height:34px;
    border-radius:50%;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    flex-shrink:0;
}

.choice-text{
    flex:1;
}

@media(max-width:600px){
    .hero h1{
        font-size:30px;
    }

    .hero-text{
        font-size:16px;
    }

    .hero{
        padding:24px 16px;
    }
}
    
</style>
</head>

<body>

<div class="hero">
    <div class="hero-badge">SOCCER TYPE DIAGNOSIS</div>
    <h1>⚽ FUTURE PLAYER FINDER ⚽</h1>
    <p class="hero-text">
        10個の質問に答えて、あなたのプレースタイルに近い選手を診断しよう
    </p>

    <div class="hero-points">
        <div>6能力で分析</div>
        <div>選手画像つき</div>
        <div>練習メニュー表示</div>
    </div>
</div>
<div class="card">
    <div class="progress-area">
        <div id="progressText">Q1 / 10</div>
        <div class="progress-bar">
            <div id="progressFill"></div>
        </div>
    </div>

    <h2 id="question"></h2>
    <div id="choices"></div>
    <div id="result"></div>
</div>

<div class="chart-box" id="chartBox">
    <canvas id="radarChart"></canvas>
</div>

<script>
const questions = [
    {
        q:"試合で一番楽しい瞬間は？",
        c:["味方への決定的なパス","相手を抜く瞬間","ゴールを決める瞬間","ボールを奪う瞬間"]
    },
    {
        q:"チームで任されたい役割は？",
        c:["ゲームメイカー","チャンスメイカー","エースストライカー","守備の中心"]
    },
    {
        q:"成長させたい能力は？",
        c:["視野・パス","ドリブル","決定力","守備力"]
    },
    {
        q:"サッカーで一番大切なのは？",
        c:["チームを動かす","個で打開する","得点を取る","失点を防ぐ"]
    },
    {
        q:"同点の終盤でボールを持ったら？",
        c:["味方を活かす","仕掛ける","ゴールを狙う","ボールを失わない"]
    },
    {
        q:"監督から褒められたいのは？",
        c:["判断力","技術力","得点力","守備力"]
    },
    {
        q:"好きな練習は？",
        c:["パス練習","ドリブル練習","シュート練習","守備練習"]
    },
    {
        q:"チームメイトから言われたい言葉は？",
        c:["試合を作ってくれる","何かしてくれそう","点を取ってくれる","安心して任せられる"]
    },
    {
        q:"理想の選手像は？",
        c:["チームを支配する選手","観客を沸かせる選手","ゴールを量産する選手","チームを支える選手"]
    },
    {
        q:"能力を一つ伸ばせるなら？",
        c:["戦術理解・視野","ドリブル技術","シュート技術","守備能力"]
    }
];

const scores = {
    Q1:{
        A:[3,0,0,0,0,1],
        B:[0,3,0,0,0,0],
        C:[0,0,3,0,0,0],
        D:[0,0,0,3,1,0]
    },
    Q2:{
        A:[3,0,0,0,0,2],
        B:[0,3,0,0,0,0],
        C:[0,0,3,0,0,1],
        D:[0,0,0,3,1,2]
    },
    Q3:{
        A:[3,0,0,0,0,1],
        B:[0,3,0,0,0,0],
        C:[0,0,3,0,0,0],
        D:[0,0,0,3,1,0]
    },
    Q4:{
        A:[2,0,0,0,0,2],
        B:[0,3,0,0,0,0],
        C:[0,0,3,0,0,0],
        D:[0,0,0,3,1,1]
    },
    Q5:{
        A:[3,0,0,0,0,1],
        B:[0,3,0,0,0,0],
        C:[0,0,3,0,0,0],
        D:[0,0,0,2,1,1]
    },
    Q6:{
        A:[2,0,0,0,0,2],
        B:[0,3,0,0,0,0],
        C:[0,0,3,0,0,0],
        D:[0,0,0,3,1,0]
    },
    Q7:{
        A:[3,0,0,0,0,0],
        B:[0,3,0,0,0,0],
        C:[0,0,3,0,0,0],
        D:[0,0,0,3,1,0]
    },
    Q8:{
        A:[3,0,0,0,0,1],
        B:[0,3,0,0,0,0],
        C:[0,0,3,0,0,0],
        D:[0,0,0,3,1,1]
    },
    Q9:{
        A:[3,0,0,0,0,2],
        B:[0,3,0,0,0,0],
        C:[0,0,3,0,0,0],
        D:[0,0,0,3,1,2]
    },
    Q10:{
        A:[3,0,0,0,0,1],
        B:[0,3,0,0,0,0],
        C:[0,0,3,0,0,0],
        D:[0,0,0,3,1,0]
    }
};

const players = {
    "デブライネ":[10,7,8,5,8,8],
    "ヴィニシウス":[5,10,8,4,8,6],
    "ハーランド":[4,6,10,4,7,6],
    "ファンダイク":[5,4,4,10,7,9],
    "カンテ":[6,5,4,10,10,7]
};

const descriptions = {
    "デブライネ":"高い視野と正確なパスで試合を支配する司令塔タイプです。味方を活かすプレーやチャンスメイクに優れています。",
    "ヴィニシウス":"高いドリブル能力と突破力を持つアタッカータイプです。1対1で相手を抜き、試合の流れを変える力があります。",
    "ハーランド":"圧倒的な得点力を持つストライカータイプです。ゴール前での決定力が高く、チームの得点源として活躍できます。",
    "ファンダイク":"守備力とリーダーシップに優れたディフェンダータイプです。冷静な判断と統率力でチームを支える存在です。",
    "カンテ":"豊富な運動量と守備力でチームを支えるミッドフィルダータイプです。ボール奪取や献身的なプレーに優れています。"
};
const trainingMenus = {
    "デブライネ":[
        "スルーパス練習",
        "首振りで周囲を見る練習",
        "ロングキック練習"
    ],
    "ヴィニシウス":[
        "1対1のドリブル練習",
        "スピードに乗った突破練習",
        "切り返し練習"
    ],
    "ハーランド":[
        "シュート精度を高める練習",
        "ゴール前のポジショニング練習",
        "フィジカル強化"
    ],
    "ファンダイク":[
        "1対1の守備練習",
        "ヘディング・空中戦の練習",
        "守備ラインの声かけ練習"
    ],
    "カンテ":[
        "ボール奪取の練習",
        "持久力を高める走り込み",
        "相手の動きを予測する練習"
    ]
};

const playerImages = {
    "デブライネ":"debruyne.jpg.png",
    "ヴィニシウス":"vinicius.jpg.png",
    "ハーランド":"haaland.jpg.png",
    "ファンダイク":"vandijk.jpg.png",
    "カンテ":"kante.jpg.png"
};

let idx = 0;
let me = [0,0,0,0,0,0];

    function render(){
    document.getElementById("question").innerText = "Q" + (idx + 1) + " " + questions[idx].q;

    document.getElementById("progressText").innerText = "Q" + (idx + 1) + " / " + questions.length;

    const progress = ((idx + 1) / questions.length) * 100;
    document.getElementById("progressFill").style.width = progress + "%";

    let html = "";

    ["A","B","C","D"].forEach((key,i)=>{
        html += `
            <button class="choice-btn" onclick="answer('${key}')">
                <span class="choice-label">${key}</span>
                <span class="choice-text">${questions[idx].c[i]}</span>
            </button>
        `;
    });

    document.getElementById("choices").innerHTML = html;
}

function answer(choice){
    const add = scores["Q" + (idx + 1)][choice];

    me = me.map((v,i)=>v + add[i]);

    idx++;

    if(idx < questions.length){
        render();
    }else{
        finish();
    }
}

function finish(){
    document.getElementById("choices").innerHTML = "";
    document.getElementById("question").innerText = "診断結果";

    let best = "";
    let bestDist = Infinity;

    for(const [name, value] of Object.entries(players)){
        let distance = 0;

        for(let i=0; i<6; i++){
            distance += (me[i] - value[i]) ** 2;
        }

        if(distance < bestDist){
            bestDist = distance;
            best = name;
        }
    }

const abilityNames = ["パス","ドリブル","シュート","守備","運動量","リーダーシップ"];

const abilityHtml = abilityNames.map((name,i)=>{
    const percent = Math.min((me[i] / 30) * 100, 100);

    return `
        <div class="ability-item">
            <div class="ability-name">${name}：${me[i]}</div>
            <div class="ability-bar">
                <div class="ability-bar-fill" style="width:${percent}%"></div>
            </div>
        </div>
    `;
}).join("");

const trainingHtml = trainingMenus[best].map(menu => `<li>${menu}</li>`).join("");

document.getElementById("result").innerHTML = `
    <div class="result-hero">
        <div class="result-badge">診断結果</div>

        <h2 class="result-title">
            あなたが目指すべき選手は<br>
            <span>${best}</span>
        </h2>

        <img class="player-img" src="${playerImages[best]}" alt="${best}">

        <p class="result-description">${descriptions[best]}</p>
    </div>

    <div class="section-card">
        <h3>おすすめ練習メニュー</h3>
        <ul class="training-list">
            ${trainingHtml}
        </ul>
    </div>

    <div class="section-card">
        <h3>あなたの能力</h3>
        <div class="ability-grid">
            ${abilityHtml}
        </div>
    </div>
`;

    document.getElementById("chartBox").style.display = "block";

    new Chart(document.getElementById("radarChart"),{
        type:"radar",
        data:{
            labels:["パス","ドリブル","シュート","守備","運動量","リーダーシップ"],
            datasets:[
                {
                    label:"あなた",
                    data:me,
                    backgroundColor:"rgba(52,152,219,0.25)",
                    borderColor:"rgba(52,152,219,1)",
                    pointBackgroundColor:"rgba(52,152,219,1)"
                },
                {
                    label:best,
                    data:players[best],
                    backgroundColor:"rgba(231,76,60,0.25)",
                    borderColor:"rgba(231,76,60,1)",
                    pointBackgroundColor:"rgba(231,76,60,1)"
                }
            ]
        },
        options:{
            responsive:true,
            scales:{
                r:{
                    suggestedMin:0,
                    suggestedMax:30
                }
            }
        }
    });
}

render();
</script>

</body>
</html>
