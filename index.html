<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>あなたが目指すべき選手診断</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f9b0f,#006400);
    color:white;
    text-align:center;
    padding:20px;
    min-height:100vh;
}

h1{
    font-size:40px;
    margin-bottom:10px;
}

h2{
    margin-bottom:30px;
}

#question{
    background:white;
    color:black;
    max-width:700px;
    margin:20px auto;
    padding:20px;
    border-radius:15px;
    font-size:24px;
    font-weight:bold;
}

button{
    display:block;
    width:90%;
    max-width:400px;
    margin:12px auto;
    padding:15px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

#btnA{
    background:#3498db;
    color:white;
}

#btnB{
    background:#e67e22;
    color:white;
}

#btnC{
    background:#e74c3c;
    color:white;
}

#btnD{
    background:#2c3e50;
    color:white;
}

#result{
    background:white;
    color:black;
    max-width:700px;
    margin:30px auto;
    padding:20px;
    border-radius:15px;
    font-size:20px;
}

canvas{
    background:white;
    border-radius:15px;
    padding:10px;
    margin-top:20px;
    max-width:700px;
}

</style>

</head>
<body>

<h1>⚽ FUTURE PLAYER FINDER ⚽</h1>
<h2>あなたが目指すべき選手診断</h2>

<p id="question">Q1 試合で一番楽しい瞬間は？</p>

<button id="btnA" onclick="answer('A')">味方への決定的なパス</button>
<button id="btnB" onclick="answer('B')">相手を抜く瞬間</button>
<button id="btnC" onclick="answer('C')">ゴールを決める瞬間</button>
<button id="btnD" onclick="answer('D')">ボールを奪う瞬間</button>

<div id="result"></div>

<canvas id="radarChart"></canvas>

<script>

const questions = [
"Q1 試合で一番楽しい瞬間は？",
"Q2 チームで任されたい役割は？",
"Q3 成長させたい能力は？",
"Q4 サッカーで一番大切なのは？",
"Q5 同点終盤でボールを持ったら？",
"Q6 監督から褒められたいのは？",
"Q7 好きな練習は？",
"Q8 チームメイトから言われたい言葉は？",
"Q9 理想の選手像は？",
"Q10 能力を1つ伸ばせるなら？"
];

const choices = [

["味方への決定的なパス","相手を抜く瞬間","ゴールを決める瞬間","ボールを奪う瞬間"],

["司令塔","ドリブラー","ストライカー","ディフェンダー"],

["パス","ドリブル","シュート","守備"],

["連携","個人技","得点","守備"],

["味方へパス","ドリブル突破","シュート","安全に守る"],

["パスセンス","突破力","得点力","守備力"],

["パス練習","ドリブル練習","シュート練習","守備練習"],

["視野が広い","仕掛けが上手い","決定力が高い","守備が上手い"],

["司令塔","ドリブラー","ストライカー","守備の要"],

["パス","ドリブル","シュート","守備"]

];

let step = 0;

let pass = 0;
let dribble = 0;
let shoot = 0;
let defense = 0;

function answer(choice){

    if(choice === "A") pass += 3;
    if(choice === "B") dribble += 3;
    if(choice === "C") shoot += 3;
    if(choice === "D") defense += 3;

    step++;

    if(step < questions.length){

        document.getElementById("question").innerText = questions[step];

        document.getElementById("btnA").innerText = choices[step][0];
        document.getElementById("btnB").innerText = choices[step][1];
        document.getElementById("btnC").innerText = choices[step][2];
        document.getElementById("btnD").innerText = choices[step][3];

    }else{

        let player = "";

        let maxScore = Math.max(pass, dribble, shoot, defense);

        if(maxScore === pass){
            player = "デブライネ";
        }
        else if(maxScore === dribble){
            player = "ヴィニシウス";
        }
        else if(maxScore === shoot){
            player = "ハーランド";
        }
        else{
            player = "ファンダイク";
        }

        document.getElementById("question").innerText = "診断終了";

        document.getElementById("result").innerHTML =
        "<h2>診断結果</h2>" +
        "パス：" + pass + "<br>" +
        "ドリブル：" + dribble + "<br>" +
        "シュート：" + shoot + "<br>" +
        "守備：" + defense + "<br><br>" +
        "🏆 あなたが目指すべき選手は<br><b>" +
        player +
        "</b>です！";

        const ctx = document.getElementById('radarChart');

        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['パス','ドリブル','シュート','守備'],
                datasets: [{
                    label: 'あなた',
                    data: [pass, dribble, shoot, defense]
                }]
            }
        });

        document.getElementById("btnA").style.display="none";
        document.getElementById("btnB").style.display="none";
        document.getElementById("btnC").style.display="none";
        document.getElementById("btnD").style.display="none";
    }
}

</script>

</body>
</html>
