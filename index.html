.player-icon{
    --icon-main:#22c55e;
    --icon-accent:#facc15;
    position:relative;
    width:170px;
    height:170px;
    margin:22px auto;
    border-radius:50%;
    background:
        radial-gradient(circle at 50% 36%,rgba(255,255,255,0.9) 0 12px,transparent 13px),
        radial-gradient(circle at 50% 52%,var(--icon-main) 0 34px,transparent 35px),
        linear-gradient(135deg,rgba(255,255,255,0.22),rgba(255,255,255,0.04)),
        var(--icon-main);
    box-shadow:0 16px 35px rgba(0,0,0,0.32),inset 0 0 0 7px rgba(255,255,255,0.12);
    overflow:hidden;
}
.player-icon::before,.player-icon::after{content:"";position:absolute;display:block;}
.player-icon::before{
    left:50%;
    bottom:22px;
    width:76px;
    height:58px;
    transform:translateX(-50%);
    border-radius:42px 42px 20px 20px;
    background:rgba(15,23,42,0.74);
}
.player-icon::after{
    left:50%;
    top:50%;
    width:54px;
    height:54px;
    transform:translate(-50%,-50%);
    border-radius:50%;
    border:4px solid var(--icon-accent);
    box-shadow:0 0 0 7px rgba(255,255,255,0.1);
}
.player-icon.pass-icon{--icon-main:#2563eb;--icon-accent:#bfdbfe;}
.player-icon.pass-icon::after{width:86px;height:4px;border:0;border-radius:999px;background:var(--icon-accent);box-shadow:24px -18px 0 -1px var(--icon-accent),24px 18px 0 -1px var(--icon-accent);}

.player-icon.dribble-icon::after{width:84px;height:48px;border:0;border-radius:50%;background:radial-gradient(circle,var(--icon-accent) 0 5px,transparent 6px) 0 4px / 28px 20px repeat-x,radial-gradient(circle,var(--icon-accent) 0 5px,transparent 6px) 14px 26px / 28px 20px repeat-x;}
.player-icon.shoot-icon{--icon-main:#dc2626;--icon-accent:#fee2e2;}
.player-icon.shoot-icon::after{width:0;height:0;border-top:24px solid transparent;border-bottom:24px solid transparent;border-left:66px solid var(--icon-accent);border-right:0;border-radius:0;box-shadow:none;}
.player-icon.defense-icon{--icon-main:#0f766e;--icon-accent:#ccfbf1;}
.player-icon.defense-icon::after{width:62px;height:72px;border:5px solid var(--icon-accent);border-radius:28px 28px 18px 18px;box-shadow:none;}
.player-icon.stamina-icon{--icon-main:#ea580c;--icon-accent:#ffedd5;}
.player-icon.stamina-icon::after{width:82px;height:52px;border:0;border-radius:0;background:linear-gradient(90deg,transparent 0 8px,var(--icon-accent) 8px 14px,transparent 14px 24px,var(--icon-accent) 24px 30px,transparent 30px 40px,var(--icon-accent) 40px 46px,transparent 46px),linear-gradient(135deg,transparent 0 38%,var(--icon-accent) 39% 50%,transparent 51%);}

<script>
(() => {
    const files = {
        personalityQuestions: "./personality_questions.csv",
        personalityTypes: "./personality_types.csv",
        abilityQuestions: "./questions.csv"
    };
    const text = {
        loading: "\u8aad\u307f\u8fbc\u307f\u4e2d...",
        start: "\u8a3a\u65ad\u3092\u59cb\u3081\u308b",
        loadError: "\u8aad\u307f\u8fbc\u307f\u30a8\u30e9\u30fc",
        dataError: "\u8a3a\u65ad\u30c7\u30fc\u30bf\u3092\u8aad\u307f\u8fbc\u3081\u307e\u305b\u3093\u3067\u3057\u305f",
        personality: "\u30d7\u30ec\u30fc\u30b9\u30bf\u30a4\u30eb\u8a3a\u65ad",
        ability: "\u80fd\u529b\u5024\u8a3a\u65ad",
        unanswered: "\u672a\u56de\u7b54",
        result: "\u8a3a\u65ad\u7d50\u679c",
        noType: "\u30bf\u30a4\u30d7\u3092\u5224\u5b9a\u3067\u304d\u307e\u305b\u3093\u3067\u3057\u305f",
        typePrefix: "\u3042\u306a\u305f\u306e\u30bf\u30a4\u30d7\u306f",
        axisTitle: "\u30d7\u30ec\u30fc\u30b9\u30bf\u30a4\u30eb\u50be\u5411",
        abilityTitle: "\u3042\u306a\u305f\u306e\u80fd\u529b\u5024",
        detailOpen: "\u8a73\u7d30\u3092\u898b\u308b",
        detailClose: "\u8a73\u7d30\u3092\u9589\u3058\u308b",
        detailTitle: "\u7d30\u304b\u3044\u80fd\u529b\u5024",
        restart: "\u3082\u3046\u4e00\u5ea6\u8a3a\u65ad\u3059\u308b",
        you: "\u3042\u306a\u305f",
        imageEmpty: "personality_types.csv \u306e image_path \u304c\u7a7a\u3067\u3059\u3002",
        imageFail: "\u753b\u50cf\u3092\u8aad\u307f\u8fbc\u3081\u307e\u305b\u3093\u3067\u3057\u305f"
    };

    let personalityQuestions = [];
    let personalityTypes = [];
    let abilityQuestionBank = [];
    let scoreItems = [];
    let radarGroups = {};
    let axisOrder = [];
    let activeQuestions = [];
    let currentIndex = 0;
    let personalityAnswers = {};
    let abilityAnswers = {};
    let loadErrors = [];
    let homeTypeCards = [];
    let diagnosisMode = "playstyle";

    const abilityNameAliases = {
        "ボールコントロール": "タッチ精度",
        "フライパス": "ロングパス",
        "フィジカル": "体の強さ",
        "ボール奪取": "ボールハント",
        "アグレッシブネス": "闘争心"
    };

    const radarItemGroups = {
        "オフェンス": ["オフェンスセンス", "決定力"],
        "ドリブル": ["タッチ精度", "ドリブル", "ボールキープ"],
        "フィジカル": ["体の強さ", "ヘディング", "ジャンプ力"],
        "ディフェンス": ["ボールハント", "闘争心", "守備意識"],
        "スピード": ["スピード", "瞬発力"],
        "パス": ["グランダーパス", "ロングパス", "カーブ"]
    };

    const typeAccents = ["#f97316","#eab308","#ef4444","#dc2626","#0ea5e9","#2563eb","#b45309","#7c3aed","#14b8a6","#8b5cf6","#22c55e","#16a34a","#06b6d4","#4f46e5","#15803d","#0f766e"];

    const $ = (id) => document.getElementById(id);

    document.addEventListener("DOMContentLoaded", initialize);

    async function initialize() {
        $("chartBox").style.display = "none";
        $("result").innerHTML = "";
        $("startBtn").disabled = true;
        $("startBtn").textContent = text.loading;

        try {
            personalityTypes = await loadPersonalityTypes();
            [personalityQuestions, abilityQuestionBank] = await Promise.all([
                loadPersonalityQuestions(personalityTypes.map((type) => type.typeName)),
                loadAbilityQuestions()
            ]);
            axisOrder = unique(personalityQuestions.map((question) => question.axis).filter(Boolean));
            $("startBtn").disabled = false;
            $("startBtn").textContent = text.start;
            renderHomeTypeGrid();
            updateStatus("");
            console.log("personality_questions.csv loaded:", personalityQuestions.length);
            console.log("personality_types.csv loaded:", personalityTypes.length);
            console.log("questions.csv ability questions loaded:", abilityQuestionBank.length);
        } catch (error) {
            console.log("Diagnosis CSV load failed", error);
            updateStatus(loadErrors.join("<br>") || text.dataError);
            $("startBtn").disabled = true;
            $("startBtn").textContent = text.loadError;
        }
    }

    async function loadPersonalityQuestions(typeNames = []) {
        const rows = await fetchCsvRows(files.personalityQuestions, "personality_questions.csv" + text.dataError);
        let headerIndex = findHeaderRow(rows, ["No", "質問", "回答", "配点"]);
        if (headerIndex < 0) headerIndex = findHeaderRow(rows, ["質問", "回答", "配点"]);
        if (headerIndex < 0) headerIndex = findHeaderRow(rows, ["question_id", "question"]);
        if (headerIndex < 0) headerIndex = findHeaderRow(rows, ["質問", "回答"]);
        if (headerIndex < 0) headerIndex = findHeaderRow(rows, ["質問"]);
        if (headerIndex < 0) throwCsvFormatError("personality_questions.csv");
        const headers = rows[headerIndex].map(normalizeCell);
        const typeScoreColumns = headers.filter((header) => typeNames.includes(header));

        if (headers.includes("質問") && headers.includes("回答") && headers.includes("配点")) {
            return loadJapanesePersonalityQuestions(rows, headerIndex, headers, typeNames);
        }

        if (headers.includes("question_id") && headers.includes("question") && headers.includes("choice") && headers.includes("choice_text") && typeScoreColumns.length) {
            return loadTypeScorePersonalityQuestions(rows, headerIndex, headers, typeScoreColumns);
        }

        const legacyHeaderRequired = ["choice_a_text", "choice_b_text"];
        if (!legacyHeaderRequired.every((column) => headers.includes(column))) throwCsvFormatError("personality_questions.csv");
        return rows.slice(headerIndex + 1)
            .map((row) => rowToObject(headers, row))
            .filter((row) => row.question_id && row.question && row.choice_a_text && row.choice_b_text)
            .map((row) => ({
                section: "personality",
                id: row.question_id,
                axis: row.axis,
                question: row.question,
                tieBreakQuestion: row.tie_break_question,
                choices: [
                    { key: row.choice_a || "A", text: row.choice_a_text, value: row.choice_a_value, scores: createLegacyPersonalityScores(row.choice_a_value, typeNames) },
                    { key: row.choice_b || "B", text: row.choice_b_text, value: row.choice_b_value, scores: createLegacyPersonalityScores(row.choice_b_value, typeNames) }
                ]
            }));
    }

    async function loadPersonalityTypes() {
        const rows = await fetchCsvRows(files.personalityTypes, "personality_types.csv" + text.dataError);
        const headerIndex = findHeaderRow(rows, ["type_name", "image_path", "description"]);
        if (headerIndex < 0) throwCsvFormatError("personality_types.csv");
        const headers = rows[headerIndex].map(normalizeCell);
        return rows.slice(headerIndex + 1)
            .map((row) => rowToObject(headers, row))
            .filter((row) => row.type_name)
            .map((row) => ({
                typeId: row.type_id,
                typeName: row.type_name,
                key: row.personality_key || row.type_name,
                imagePath: row.image_path,
                description: row.description,
                axes: [row.axis_attack_support, row.axis_intuition_calm, row.axis_speed_physical, row.axis_free_leader]
            }));
    }

    async function loadAbilityQuestions() {
        const rows = await fetchCsvRows(files.abilityQuestions, "questions.csv" + text.dataError);
        if (rows.length < 3) throwCsvFormatError("questions.csv");
        buildAbilityMetadata(rows[0], rows[1]);
        const abilityHeader = rows[1].map(normalizeCell);
        const questionMap = new Map();

        rows.slice(2).forEach((row, rowIndex) => {
            const routeGroup = normalizeCell(row[0]);
            const id = normalizeCell(row[1]);
            const question = normalizeCell(row[2]);
            const choice = normalizeCell(row[3]);
            const choiceText = normalizeCell(row[4]);
            const selectedGroup = normalizeCell(row[5]);
            if (!routeGroup || !id || !question || !choice || !choiceText) return;

            const questionKey = `${routeGroup}__${id}__${question}`;
            if (!questionMap.has(questionKey)) {
                questionMap.set(questionKey, { section: "ability", routeGroup, id, question, csvOrder: rowIndex, choices: [] });
            }

            const scores = {};
            scoreItems.forEach((item) => {
                const columnIndex = abilityHeader.findIndex((header) => normalizeAbilityName(header) === item);
                scores[item] = columnIndex >= 0 ? clamp(Number(normalizeCell(row[columnIndex])) || 0) : 0;
            });
            questionMap.get(questionKey).choices.push({ key: choice, text: choiceText, selectedGroup, scores });
        });

        return [...questionMap.values()].sort((a, b) => a.csvOrder - b.csvOrder);
    }

    function buildAbilityMetadata(mainHeader, detailHeader) {
        scoreItems = [];
        radarGroups = radarItemGroups;
        for (let index = 6; index < detailHeader.length; index++) {
            const itemName = normalizeAbilityName(detailHeader[index]);
            if (!itemName) continue;
            if (!scoreItems.includes(itemName)) scoreItems.push(itemName);
        }
        Object.values(radarItemGroups).flat().forEach((itemName) => {
            if (!scoreItems.includes(itemName)) scoreItems.push(itemName);
        });
    }

    async function fetchCsvRows(path, errorMessage) {
        const url = `${path}?v=${Date.now()}`;
        console.log("CSV load start:", url);
        try {
            const response = await fetch(url);
            console.log("CSV fetch result:", url, response.status, response.ok);
            if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
            const rows = parseCsv((await response.text()).replace(/^\uFEFF/, ""));
            console.log("CSV rows:", path, rows.length);
            return rows;
        } catch (error) {
            loadErrors.push(errorMessage);
            throw error;
        }
    }

    function parseCsv(textValue) {
        const rows = [];
        let row = [];
        let cell = "";
        let inQuotes = false;
        for (let i = 0; i < textValue.length; i++) {
            const char = textValue[i];
            const next = textValue[i + 1];
            if (char === '"' && inQuotes && next === '"') { cell += '"'; i++; continue; }
            if (char === '"') { inQuotes = !inQuotes; continue; }
            if (char === "," && !inQuotes) { row.push(cell); cell = ""; continue; }
            if ((char === "\n" || char === "\r") && !inQuotes) {
                if (char === "\r" && next === "\n") i++;
                row.push(cell); rows.push(row); row = []; cell = ""; continue;
            }
            cell += char;
        }
        if (cell !== "" || row.length) { row.push(cell); rows.push(row); }
        return rows.filter((items) => items.some((item) => normalizeCell(item) !== ""));
    }

    function findHeaderRow(rows, requiredColumns) {
        return rows.findIndex((row) => {
            const normalized = row.map(normalizeCell);
            return requiredColumns.every((column) => normalized.includes(column));
        });
    }

    function rowToObject(headers, row) {
        const object = {};
        headers.forEach((header, index) => {
            if (header) object[header] = normalizeCell(row[index] || "");
        });
        return object;
    }

    function createChoiceKey(index) {
        return String.fromCharCode(65 + index);
    }

    function loadTypeScorePersonalityQuestions(rows, headerIndex, headers, typeScoreColumns) {
        const questionMap = new Map();
        rows.slice(headerIndex + 1)
            .map((row) => rowToObject(headers, row))
            .filter((row) => row.question_id && row.question && row.choice && row.choice_text)
            .forEach((row, rowIndex) => {
                const questionKey = row.question_id;
                if (!questionMap.has(questionKey)) {
                    questionMap.set(questionKey, {
                        section: "personality",
                        id: row.question_id,
                        question: row.question,
                        csvOrder: rowIndex,
                        choices: []
                    });
                }

                const scores = {};
                typeScoreColumns.forEach((typeName) => {
                    scores[typeName] = Number(normalizeCell(row[typeName])) || 0;
                });

                questionMap.get(questionKey).choices.push({
                    key: row.choice,
                    text: row.choice_text,
                    scores
                });
            });
        return [...questionMap.values()].sort((a, b) => a.csvOrder - b.csvOrder);
    }

    function loadJapanesePersonalityQuestions(rows, headerIndex, headers, typeNames) {
        const noIndex = headers.indexOf("No");
        const questionIndex = headers.indexOf("質問");
        const answerIndex = headers.indexOf("回答");
        const scoreIndex = headers.indexOf("配点");
        const questionMap = new Map();
        let lastQuestionNo = "";
        let lastQuestionText = "";

        rows.slice(headerIndex + 1).forEach((row, rowIndex) => {
            const no = normalizeCell(noIndex >= 0 ? row[noIndex] : "");
            const questionText = normalizeCell(row[questionIndex]) || lastQuestionText;
            let answerText = normalizeCell(row[answerIndex]);
            let scoreText = normalizeCell(row[scoreIndex]);
            if (looksLikePersonalityScore(answerText) && scoreText && !looksLikePersonalityScore(scoreText)) {
                const originalAnswerText = answerText;
                answerText = scoreText;
                scoreText = originalAnswerText;
            }
            if (!questionText || !answerText) return;
            if (looksLikePersonalityScore(answerText)) return;

            lastQuestionNo = no || lastQuestionNo || `Q${questionMap.size + 1}`;
            lastQuestionText = questionText;
            const questionKey = lastQuestionNo;

            if (!questionMap.has(questionKey)) {
                questionMap.set(questionKey, {
                    section: "personality",
                    id: no || lastQuestionNo || `Q${questionMap.size + 1}`,
                    question: questionText,
                    csvOrder: rowIndex,
                    choices: []
                });
            }

            questionMap.get(questionKey).choices.push({
                key: createChoiceKey(questionMap.get(questionKey).choices.length),
                text: answerText,
                scoreText,
                scores: parsePersonalityScoreText(scoreText, typeNames)
            });
        });

        return [...questionMap.values()].sort((a, b) => a.csvOrder - b.csvOrder);
    }

    function getPersonalityQuestionText(row) {
        return row["質問"] || row.question || row["question"] || "";
    }

    function getPersonalityChoiceText(row, headers) {
        const preferredColumns = ["回答", "choice_text", "回答文", "回答内容", "選択肢", "選択肢文"];
        for (const column of preferredColumns) {
            const value = normalizeCell(row[column]);
            if (value && !looksLikePersonalityScore(value)) return value;
        }

        const ignoredColumns = new Set(["No", "no", "番号", "question_id", "質問", "question", "配点", "score", "scores"]);
        const fallbackColumn = headers.find((header) => {
            const value = normalizeCell(row[header]);
            return value && !ignoredColumns.has(header) && !looksLikePersonalityScore(value);
        });
        return fallbackColumn ? normalizeCell(row[fallbackColumn]) : "";
    }

    function getPersonalityScoreText(row) {
        return row["配点"] || row.score || row.scores || "";
    }

    function looksLikePersonalityScore(value) {
        const textValue = normalizeScoreText(value);
        if (!textValue) return false;
        if (/^[+-]?\d+(\.\d+)?$/.test(textValue)) return true;
        const hasScoreNumber = /[+-]\d/.test(textValue);
        const hasTypeName = personalityTypes.some((type) => textValue.includes(type.typeName));
        return hasScoreNumber && hasTypeName;
    }

    function parsePersonalityScoreText(scoreText, typeNames) {
        const scores = Object.fromEntries(typeNames.map((typeName) => [typeName, 0]));
        const source = normalizeScoreText(scoreText);
        if (!source) return scores;

        typeNames.forEach((typeName) => {
            const escapedName = escapeRegExp(typeName);
            const match = source.match(new RegExp(`${escapedName}\\s*([+-]\\s*\\d+|\\d+)`));
            if (match) scores[typeName] = Number(match[1]) || 0;
        });
        return scores;
    }

    function createLegacyPersonalityScores(value, typeNames) {
        const scores = Object.fromEntries(typeNames.map((typeName) => [typeName, 0]));
        personalityTypes.forEach((type) => {
            if (type.axes.includes(value)) scores[type.typeName] = 1;
        });
        return scores;
    }

    function escapeRegExp(value) {
        return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function normalizeScoreText(value) {
        return normalizeCell(value)
            .replace(/＋/g, "+")
            .replace(/−|ー|－/g, "-")
            .replace(/、/g, ",")
            .replace(/\s+/g, "");
    }

    function throwCsvFormatError(filename) {
        loadErrors.push(`${filename}: ${text.dataError}`);
        throw new Error(`${filename} format error`);
    }

    function normalizeCell(value) {
        return String(value ?? "").replace(/^\uFEFF/, "").trim();
    }

    function unique(values) {
        return [...new Set(values)];
    }

        const selectedCommonChoice = commonQuestion?.choices.find((choice) => choice.key === commonAnswer);
        if (selectedCommonChoice?.selectedGroup) appendAbilityGroupQuestions(selectedCommonChoice.selectedGroup);

    function createQuestionListHtml(questions, section) {
        const actionButton = section === "personality"
            ? `<button type="button" class="next-page-btn" onclick="submitPlaystylePage()">診断する</button>`
            : `<button type="button" class="submit-page-btn" onclick="submitAbilityPage()">診断する</button>`;
        return `
            <div class="question-list">
                ${questions.map((question, index) => createQuestionCardHtml(question, index)).join("")}
            </div>
            <p id="pageMessage" class="page-message">すべての質問に回答してください</p>
            ${actionButton}
        `;
    }

    function createQuestionCardHtml(question, index) {
        const selectedKey = getSelectedAnswer(question);
        const choiceLabelHtml = (choice) => question.section === "personality" ? "" : `<span class="choice-label">${escapeHtml(choice.key)}.</span>`;
        return `
            <section class="question-card" data-section="${escapeAttribute(question.section)}" data-question-key="${escapeAttribute(getQuestionDomKey(question))}">
                <h3 class="question-card__title">Q${index + 1}. ${escapeHtml(question.question)}</h3>
                <div class="question-card__choices">
                    ${question.choices.map((choice) => `
                        <button type="button" class="choice-btn choice-button answer-button option-button${selectedKey === choice.key ? " is-selected selected" : ""}" data-question-key="${escapeAttribute(getQuestionDomKey(question))}" data-choice-key="${escapeAttribute(choice.key)}" onclick="selectChoiceFromButton(this)">
                            ${choiceLabelHtml(choice)}
                            <span class="choice-text">${escapeHtml(getDisplayChoiceText(choice))}</span>
                        </button>
                    `).join("")}
                </div>
            </section>
        `;
    }

    function getDisplayChoiceText(choice) {
        const textValue = normalizeCell(choice.text);
        if (!looksLikePersonalityScore(textValue)) return textValue;
        return "";
    }

    function selectChoiceFromButton(button) {
        selectChoiceForCurrentQuestion(button.dataset.questionKey || "", button.dataset.choiceKey || "", button);
    }

    function selectChoiceForCurrentQuestion(questionDomKey, choiceKey, clickedButton) {
        if (clickedButton && typeof clickedButton.blur === "function") clickedButton.blur();
        const question = findActiveQuestionByDomKey(questionDomKey);
        if (!question) return;
        if (question.section === "personality") personalityAnswers[question.id] = choiceKey;
        else {
            const answerKey = getAbilityAnswerKey(question);
            const previousKey = abilityAnswers[answerKey];
            abilityAnswers[answerKey] = choiceKey;
            if (question.routeGroup === "common" && previousKey !== choiceKey) {
                const selected = question.choices.find((choice) => choice.key === choiceKey);
                clearNonCommonAbilityAnswers();
                abilityAnswers[answerKey] = choiceKey;
                appendAbilityGroupQuestions(selected?.selectedGroup || "");
                showAbilityPage({ scrollTop: false, scrollToAfterQuestionKey: questionDomKey });
                return;
            }
        }
        updateQuestionSelection(questionDomKey, choiceKey);
        blurActiveButton();
        scrollAfterAnswer(questionDomKey);
    }

    function updateQuestionSelection(questionDomKey, choiceKey) {
        const card = document.querySelector(`[data-question-key="${cssEscape(questionDomKey)}"]`);
        if (!card) return;
        card.querySelectorAll(".choice-btn, .answer-button, .choice-button, .option-button").forEach((button) => {
            button.classList.remove("selected", "active", "focus", "is-selected");
        });
        const selectedButton = card.querySelector(`.choice-btn[data-choice-key="${cssEscape(choiceKey)}"]`);
        if (selectedButton) selectedButton.classList.add("is-selected", "selected");
    }

    function scrollAfterAnswer(questionDomKey) {
        const cards = [...document.querySelectorAll(".question-card")];
        const currentIndex = cards.findIndex((card) => card.dataset.questionKey === questionDomKey);
        if (currentIndex < 0) return;
        const nextCard = cards[currentIndex + 1];
        if (nextCard) {
            nextCard.scrollIntoView({ behavior: "smooth", block: "start" });
            return;
        }
        const actionButton = document.querySelector(".next-page-btn, .submit-page-btn");
        if (actionButton) actionButton.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function submitPlaystylePage() {
        if (!validateQuestionsAnswered(personalityQuestions)) return;
        showConfirm();
    }

    function submitAbilityPage() {
        const abilityQuestions = activeQuestions.filter((question) => question.section === "ability");
        if (!validateQuestionsAnswered(abilityQuestions)) return;
        finishDiagnosisFlow();
    }

    function validateQuestionsAnswered(questions) {
        const missing = questions.find((question) => !getSelectedAnswer(question));
        const message = $("pageMessage");
        if (!missing) {
            if (message) message.classList.remove("is-visible");
            return true;
        }
        if (message) message.classList.add("is-visible");
        const card = document.querySelector(`[data-question-key="${cssEscape(getQuestionDomKey(missing))}"]`);
        if (card) card.scrollIntoView({ behavior: "smooth", block: "center" });
        return false;
    }

    function getSelectedAnswer(question) {
        return question.section === "personality" ? personalityAnswers[question.id] : abilityAnswers[getAbilityAnswerKey(question)];
    }

    function findActiveQuestionByDomKey(questionDomKey) {
        return activeQuestions.find((question) => getQuestionDomKey(question) === questionDomKey);
    }

    function getQuestionDomKey(question) {
        return question.section === "personality" ? `personality__${question.id}` : `ability__${getAbilityAnswerKey(question)}`;
    }

    function clearNonCommonAbilityAnswers() {
        activeQuestions.filter((question) => question.section === "ability" && question.routeGroup !== "common").forEach((question) => {
            delete abilityAnswers[getAbilityAnswerKey(question)];
        });
    }

    function cssEscape(value) {
        if (window.CSS && typeof window.CSS.escape === "function") return window.CSS.escape(value);
        return String(value).replace(/["\\]/g, "\\$&");
    }

    function clearChoiceButtonStates() {
        document.querySelectorAll(".choice-btn, .answer-button, .choice-button, .option-button").forEach((button) => {
            button.classList.remove("selected", "active", "focus", "is-selected");
            if (typeof button.blur === "function") button.blur();
        });
    }

    function blurActiveButton() {
        const activeElement = document.activeElement;
        if (!activeElement) return;
        if (typeof HTMLElement !== "undefined" && activeElement instanceof HTMLElement) {
            activeElement.blur();
            return;
        }
        if (typeof activeElement.blur === "function") activeElement.blur();
    }

    function appendAbilityStartQuestion() {
        if (activeQuestions.some((question) => question.section === "ability")) return;
        activeQuestions = [...personalityQuestions, ...uniqueQuestions(abilityQuestionBank.filter((question) => question.routeGroup === "common"))];
    }

    function appendAbilityGroupQuestions(group) {
        const firstAbilityQuestionOnly = activeQuestions.filter((question) => question.section !== "ability" || question.routeGroup === "common");
        const groupQuestions = uniqueQuestions(abilityQuestionBank.filter((question) => question.routeGroup === group));
        activeQuestions = [...firstAbilityQuestionOnly.filter((question) => question.section !== "ability"), ...uniqueQuestions([...firstAbilityQuestionOnly.filter((question) => question.section === "ability"), ...groupQuestions])];
    }

    function uniqueQuestions(questions) {
        const seen = new Set();
        return questions.filter((question) => {
            const key = `${question.id}__${question.question}`;
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
        });
    }

    function backQuestionFlow() {
        if (diagnosisMode === "ability") {
            showSimplePage("ability", "能力測定", "質問に答えると、あなたの能力値とレーダーチャートを確認できます。", "能力測定を始める", startAbilityMeasurementFlow);
            return;
        }
        showPlaystyleTop();
    }

    function showConfirm() {
        $("quizCard").classList.add("is-hidden");
        $("confirmArea").classList.remove("is-hidden");
        $("chartBox").style.display = "none";
        $("confirmList").innerHTML = activeQuestions.map((question, index) => {

        $("quizCard").classList.remove("is-hidden");
        $("progressArea").style.display = "none";
        $("choices").innerHTML = "";
        $("questionButtons").style.display = "none";

        if (diagnosisMode === "ability") {
            const detailScores = calculateAbilityScores();
            const radarScores = convertToRadarScores(detailScores);
            $("result").innerHTML = `
                <div class="result-hero">
                    <div class="result-badge">能力測定</div>
                    <h2 class="result-title"><span>あなたの能力値</span></h2>
                    <p class="result-description">回答から計算した能力バランスです。</p>
                </div>
                <div class="section-card">

                    <div class="ability-grid">${createAbilityHtml(radarScores)}</div>
                    <button type="button" id="detailToggleBtn" class="detail-toggle-btn" onclick="toggleDetailAbilities()">${text.detailOpen}</button>
                    <div id="detailAbilityArea" class="detail-ability-area">

                    </div>
                </div>
                <button type="button" class="restart-btn" onclick="startAbilityMeasurement()">もう一度測定する</button>
            `;
            drawRadarChart(radarScores);
            return;
        }

        const personality = judgePersonality();
        const resultType = findPersonalityType(personality.key);

        if (!resultType) {
            $("chartBox").style.display = "none";
            $("result").innerHTML = `<div class="result-hero"><div class="result-badge">${text.result}</div><h2 class="result-title">${text.noType}</h2><p class="result-description">personality_types.csv: ${escapeHtml(personality.key)}</p></div><button type="button" class="restart-btn" onclick="startDiagnosis()">${text.restart}</button>`;
            return;
        }

        const imagePath = normalizeImagePath(resultType.imagePath);
        const displayImagePath = resolveDisplayImagePath(imagePath);
        $("result").innerHTML = `
            <div class="result-hero">
                <div class="result-badge">${text.result}</div>
                <h2 class="result-title">${text.typePrefix}<br><span>${escapeHtml(resultType.typeName)}</span></h2>
                ${imagePath ? `<img id="characterImage" class="character-result-image" src="${escapeAttribute(displayImagePath)}" alt="${escapeAttribute(resultType.typeName)}"><p class="image-error-message" id="imageErrorMessage"></p>` : `<p class="image-error-message" style="display:block;">${text.imageEmpty}</p>`}
                <p class="result-description">${escapeHtml(resultType.description)}</p>
            </div>
            <button type="button" class="restart-btn" onclick="startDiagnosis()">${text.restart}</button>
        `;
        attachCharacterImageError(imagePath, displayImagePath);
        $("chartBox").style.display = "none";
    }

    function judgePersonality() {
        const typeNames = personalityTypes.map((type) => type.typeName);
        const typeScores = Object.fromEntries(typeNames.map((typeName) => [typeName, 0]));
        let hasTypeScore = false;

        personalityQuestions.forEach((question) => {
            const selected = question.choices.find((choice) => choice.key === personalityAnswers[question.id]);
            if (!selected?.scores) return;
            hasTypeScore = true;
            typeNames.forEach((typeName) => {
                typeScores[typeName] += Number(selected.scores[typeName]) || 0;
            });
        });

        if (hasTypeScore) {
            const bestType = personalityTypes.reduce((best, type) => {
                if (!best) return type;
                return (typeScores[type.typeName] || 0) > (typeScores[best.typeName] || 0) ? type : best;
            }, null);
            return { axes: [], key: bestType?.typeName || "", scores: typeScores };
        }

        return { axes: [], key: "", scores: typeScores };
    }

    function calculateAbilityScores() {
        const scores = Object.fromEntries(scoreItems.map((item) => [item, 0]));
        activeQuestions.filter((question) => question.section === "ability").forEach((question) => {
            const selectedKey = abilityAnswers[getAbilityAnswerKey(question)];
            const selected = question.choices.find((choice) => choice.key === selectedKey);
            if (!selected) return;
            scoreItems.forEach((item) => scores[item] = clamp(scores[item] + (selected.scores[item] || 0)));
        });
        return scores;
    }

    function convertToRadarScores(scores) {
        const radarScores = {};
        Object.entries(radarGroups).forEach(([name, items]) => {
            const validItems = items.filter((item) => Object.prototype.hasOwnProperty.call(scores, item));
            const targetItems = validItems.length ? validItems : items;
            const total = targetItems.reduce((sum, item) => sum + (Number(scores[item]) || 0), 0);
            radarScores[name] = clamp(Math.round(total / targetItems.length));
        });
        return radarScores;
    }

    function drawRadarChart(scores) {
        const canvas = $("radarChart");
        const chartBox = $("chartBox");
        const ctx = canvas.getContext("2d");
        const labels = Object.keys(radarGroups);
        const values = labels.map((label) => clamp(scores[label] || 0));
        const size = Math.min(360, Math.max(280, chartBox.clientWidth || 320));
        const scale = window.devicePixelRatio || 1;
        const center = size / 2;
        const radius = size * 0.34;
        chartBox.style.display = "block";
        canvas.width = size * scale;
        canvas.height = size * scale;
        canvas.style.width = `${size}px`;
        canvas.style.height = `${size}px`;
        ctx.setTransform(scale, 0, 0, scale, 0, 0);
        ctx.clearRect(0, 0, size, size);
        ctx.strokeStyle = "rgba(148,163,184,0.55)";
        ctx.lineWidth = 1;
        for (let level = 1; level <= 5; level++) drawRadarShape(ctx, labels.length, center, radius * level / 5);
        ctx.strokeStyle = "rgba(148,163,184,0.35)";
        labels.forEach((_, index) => {
            const point = radarPoint(index, labels.length, center, radius);
            ctx.beginPath(); ctx.moveTo(center, center); ctx.lineTo(point.x, point.y); ctx.stroke();
        });
        ctx.fillStyle = "#1f2937";
        ctx.font = "12px Arial, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        labels.forEach((label, index) => {
            const point = radarPoint(index, labels.length, center, radius + 34);
            ctx.fillText(label, point.x, point.y);
        });
        ctx.beginPath();
        values.forEach((value, index) => {
            const point = radarPoint(index, values.length, center, radius * value / 100);
            if (index === 0) ctx.moveTo(point.x, point.y); else ctx.lineTo(point.x, point.y);
        });
        ctx.closePath();
        ctx.fillStyle = "rgba(37,99,235,0.22)";
        ctx.strokeStyle = "#2563eb";
        ctx.lineWidth = 3;
        ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#2563eb";
        values.forEach((value, index) => {
            const point = radarPoint(index, values.length, center, radius * value / 100);
            ctx.beginPath(); ctx.arc(point.x, point.y, 4, 0, Math.PI * 2); ctx.fill();
        });
        ctx.font = "bold 13px Arial, sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(text.you, 18, 24);
    }

    function drawRadarShape(ctx, sides, center, radius) {
        ctx.beginPath();
        for (let index = 0; index < sides; index++) {
            const point = radarPoint(index, sides, center, radius);
            if (index === 0) ctx.moveTo(point.x, point.y); else ctx.lineTo(point.x, point.y);
        }
        ctx.closePath(); ctx.stroke();
    }

    function radarPoint(index, total, center, radius) {
        const angle = -Math.PI / 2 + (Math.PI * 2 * index / total);
        return { x: center + Math.cos(angle) * radius, y: center + Math.sin(angle) * radius };
    }

    function createAbilityHtml(scores) {
        return Object.entries(scores).map(([name, value]) => {
            const score = clamp(value);
            return `<div class="ability-item"><div class="ability-name"><span>${escapeHtml(name)}</span><span>${score}</span></div><div class="ability-bar"><div class="ability-bar-fill" style="width:${score}%"></div></div></div>`;
        }).join("");
    }

    function createOrderedDetailScores(scores) {
        const orderedScores = {};
        unique(Object.values(radarItemGroups).flat()).forEach((item) => orderedScores[item] = clamp(scores[item] || 0));
        return orderedScores;
    }

    function toggleDetailAbilities() {
        const detailArea = $("detailAbilityArea");
        const toggleButton = $("detailToggleBtn");
        if (!detailArea || !toggleButton) return;
        const isOpen = detailArea.classList.contains("is-open");
        detailArea.classList.toggle("is-open", !isOpen);
        toggleButton.textContent = isOpen ? text.detailOpen : text.detailClose;
    }

    function findPersonalityType(key) {
        return personalityTypes.find((type) => type.typeName === key) || personalityTypes.find((type) => type.key === key) || personalityTypes.find((type) => type.axes.join(" \u00d7 ") === key) || null;
    }

    function getAbilityAnswerKey(question) { return `${question.routeGroup}__${question.id}__${question.question}`; }
    function clamp(value) { return Math.max(0, Math.min(100, Math.round(Number(value) || 0))); }
    function normalizeAbilityName(value) {
        const name = normalizeCell(value);
        return abilityNameAliases[name] || name;
    }
    function normalizeImagePath(path) { return normalizeCell(path).replace(/^\/+/, ""); }
    function resolveDisplayImagePath(imagePath) { return imagePath; }
    function getFallbackImagePath(imagePath) { return imagePath && !imagePath.includes("/") ? `images/${imagePath}` : ""; }

    function attachCharacterImageError(imagePath, displayImagePath) {
        const image = $("characterImage");
        if (!image || !imagePath) return;
        image.addEventListener("error", () => {
            const fallbackImagePath = getFallbackImagePath(imagePath);
            if (fallbackImagePath && image.dataset.fallbackTried !== "1") {
                image.dataset.fallbackTried = "1";
                console.log(`${text.imageFail}: image_path=${imagePath} / src=${displayImagePath}. fallback=${fallbackImagePath}`);
                image.src = fallbackImagePath;
                return;
            }
            console.log(`${text.imageFail}: image_path=${imagePath} / src=${image.src || displayImagePath}`);
            image.style.display = "none";
            const message = $("imageErrorMessage");
            if (message) {
                message.style.display = "block";
                message.textContent = `${text.imageFail}: ${imagePath}`;
            }
        });
    }

    function escapeHtml(value) {
        return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function escapeAttribute(value) { return escapeHtml(value).replace(/`/g, "&#96;"); }

    window.startDiagnosis = startDiagnosisFlow;
    window.startAbilityMeasurement = startAbilityMeasurementFlow;
    window.showHomeView = showHomeView;
    window.showPlaystyleTop = showPlaystyleTop;
    window.showAbilityMeasurementTop = showAbilityMeasurementTop;
    window.showPersonalityComingSoon = showPersonalityComingSoon;
    window.showAllDiagnosisComingSoon = showAllDiagnosisComingSoon;
    window.selectChoice = selectChoiceForCurrentQuestion;
    window.selectChoiceFromButton = selectChoiceFromButton;
    window.submitPlaystylePage = submitPlaystylePage;
    window.submitAbilityPage = submitAbilityPage;
    window.backQuestion = backQuestionFlow;
    window.returnToQuestions = returnToQuestionsFlow;
    window.finish = finishDiagnosisFlow;
    window.toggleDetailAbilities = toggleDetailAbilities;
    window.showHomeTypeDetail = showHomeTypeDetail;
    window.closeHomeTypeDetail = closeHomeTypeDetail;
    window.handleHomeTypeImageError = handleHomeTypeImageError;
})();
</script>
