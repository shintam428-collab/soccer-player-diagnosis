<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>あなたが目指すべき選手診断</title>
</head>
<body>

<h1>あなたが目指すべき選手診断</h1>

<p id="question">Q1 試合で一番楽しい瞬間は？</p>

<button onclick="answer('A')">味方への決定的なパス</button>
<button onclick="answer('B')">相手を抜く瞬間</button>
<button onclick="answer('C')">ゴールを決める瞬間</button>
<button onclick="answer('D')">ボールを奪う瞬間</button>

<p id="result"></p>

<script>
let step = 1;
let answers = [];

function answer(choice){

    answers.push(choice);

    if(step === 1){

        document.getElementById("question").innerText =
        "Q2 チームで任されたい役割は？";

        step = 2;

    }else{

        document.getElementById("question").innerText =
        "診断終了";

        document.getElementById("result").innerText =
        "回答：" + answers.join(", ");

    }
}
</script>

</body>
</html>
