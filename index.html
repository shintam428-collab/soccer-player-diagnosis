/* 非表示用クラス */
.is-hidden{

}

.ambient-bg{
    position:fixed;
    inset:0;
    z-index:0;
    overflow:hidden;
    pointer-events:none;
}

.ambient-bg__gradient{
    position:absolute;
    inset:0;
    background:
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(34,197,94,0.35) 0%, transparent 55%),
        radial-gradient(ellipse 60% 40% at 20% 80%, rgba(59,130,246,0.2) 0%, transparent 50%),
        radial-gradient(ellipse 50% 35% at 85% 70%, rgba(250,204,21,0.12) 0%, transparent 45%),
        linear-gradient(165deg, #0a1628 0%, #064e3b 45%, #14532d 100%);
    animation:bg-shift 12s ease-in-out infinite alternate;
}

.ambient-bg__pitch{
    position:absolute;
    inset:0;
    opacity:0.55;
    background:
        repeating-linear-gradient(
            0deg,
            transparent,
            transparent 48px,
            rgba(255,255,255,0.04) 48px,
            rgba(255,255,255,0.04) 96px

        radial-gradient(circle at 50% 115%, transparent 28%, rgba(255,255,255,0.07) 28.2%, rgba(255,255,255,0.07) 28.8%, transparent 29%),
        radial-gradient(circle at 50% 115%, transparent 42%, rgba(255,255,255,0.05) 42.2%, rgba(255,255,255,0.05) 42.6%, transparent 43%);
}

.ambient-bg__glow{
    position:absolute;
    border-radius:50%;
    filter:blur(60px);
    animation:float-glow 8s ease-in-out infinite;
}

.ambient-bg__glow--1{
    width:320px;
    height:320px;
    top:-80px;
    left:-60px;
    background:rgba(34,197,94,0.45);
    animation-delay:0s;
}

.ambient-bg__glow--2{
    width:280px;
    height:280px;
    bottom:-40px;
    right:-40px;
    background:rgba(59,130,246,0.35);
    animation-delay:-4s;
}

.ambient-bg__spotlight{
    position:absolute;
    top:0;
    left:50%;
    transform:translateX(-50%);
    width:140%;
    height:55%;
    background:radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.14) 0%, transparent 65%);
    animation:spotlight-pulse 6s ease-in-out infinite;
}

.ambient-bg__grid{
    position:absolute;
    inset:0;
    background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:60px 60px;
    mask-image:radial-gradient(ellipse 70% 60% at 50% 40%, black 20%, transparent 75%);
}

@keyframes bg-shift{
    0%{filter:hue-rotate(0deg) brightness(1);}
    100%{filter:hue-rotate(8deg) brightness(1.05);}
}

@keyframes float-glow{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(30px,20px) scale(1.08);}
}

@keyframes spotlight-pulse{
    0%,100%{opacity:0.7;}
    50%{opacity:1;}
}

.start-screen{

.start-screen__overlay{

    background:
        linear-gradient(180deg, rgba(10,22,40,0.92) 0%, rgba(10,22,40,0.72) 35%, rgba(6,78,59,0.55) 65%, rgba(10,22,40,0.88) 100%);
    z-index:1;
}

.start-screen__grass{
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    height:38%;
    z-index:0;
    background:
        repeating-linear-gradient(
            0deg,
            transparent,
            transparent 40px,
            rgba(255,255,255,0.05) 40px,
            rgba(255,255,255,0.05) 80px
        ),
        radial-gradient(ellipse 55% 40% at 50% 0%, rgba(34,197,94,0.45) 0%, transparent 70%),
        linear-gradient(180deg, transparent 0%, rgba(21,128,61,0.5) 30%, rgba(22,101,52,0.75) 100%);
}

.start-screen__grass::after{
    content:"";
    position:absolute;
    bottom:18%;
    left:50%;
    transform:translateX(-50%);
    width:55%;
    height:28%;
    border:2px solid rgba(255,255,255,0.12);
    border-radius:50%;
    box-shadow:0 0 30px rgba(34,197,94,0.15);
}

.start-lights{
    position:absolute;
    inset:0;
    z-index:0;
    pointer-events:none;
}

.start-light{
    position:absolute;
    top:-30%;
    height:90%;
    filter:blur(2px);
    animation:light-sway 7s ease-in-out infinite;
}

.start-light--left{
    left:5%;
    width:45%;
    background:linear-gradient(158deg, rgba(255,255,255,0.18) 0%, transparent 68%);
    transform-origin:top left;
    animation-delay:0s;
}

.start-light--right{
    right:5%;
    width:45%;
    background:linear-gradient(202deg, rgba(255,255,255,0.16) 0%, transparent 68%);
    transform-origin:top right;
    animation-delay:-2.5s;
}

.start-light--center{
    left:30%;
    width:40%;
    background:radial-gradient(ellipse at 50% 0%, rgba(250,204,21,0.14) 0%, transparent 65%);
    animation:spotlight-pulse 5s ease-in-out infinite;
}

@keyframes light-sway{
    0%,100%{opacity:0.75; transform:rotate(-2deg);}
    50%{opacity:1; transform:rotate(3deg);}
}

.start-silhouettes{
    position:absolute;
    inset:0;
    z-index:2;
    pointer-events:none;
}

.start-player{
    position:absolute;
    bottom:10%;
    filter:drop-shadow(0 10px 20px rgba(0,0,0,0.55));
    animation:player-float 5s ease-in-out infinite;
}

.start-player--left{
    left:6%;
    width:64px;
    height:100px;
    background:linear-gradient(180deg, #475569 0%, #1e293b 55%, #0f172a 100%);
    clip-path:polygon(38% 0%,62% 0%,68% 12%,88% 38%,72% 44%,62% 32%,58% 52%,78% 100%,54% 100%,50% 58%,46% 100%,22% 100%,42% 52%,38% 32%,28% 44%,12% 38%,32% 12%);
    opacity:0.75;
    animation-delay:0s;
}

.start-player--center{
    left:50%;
    transform:translateX(-50%);
    width:78px;
    height:118px;
    bottom:14%;
    background:linear-gradient(180deg, #64748b 0%, #334155 50%, #0f172a 100%);
    clip-path:polygon(35% 0%,65% 0%,72% 10%,95% 22%,80% 30%,68% 22%,62% 40%,90% 55%,70% 58%,58% 48%,55% 100%,45% 100%,42% 48%,30% 58%,10% 55%,38% 40%,32% 22%,20% 30%,5% 22%,28% 10%);
    opacity:0.85;
    animation:player-float-center 5s ease-in-out infinite;
    animation-delay:-1.5s;
}

.start-player--right{
    right:8%;
    width:60px;
    height:96px;
    background:linear-gradient(180deg, #475569 0%, #1e293b 55%, #0f172a 100%);
    clip-path:polygon(40% 0%,60% 0%,65% 14%,82% 42%,68% 46%,58% 34%,54% 54%,75% 100%,50% 100%,46% 56%,42% 100%,18% 100%,38% 54%,34% 34%,24% 46%,10% 42%,28% 14%);
    opacity:0.7;
    animation:player-float 5s ease-in-out infinite;
    animation-delay:-3s;
}

@keyframes player-float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

@keyframes player-float-center{
    0%,100%{transform:translateX(-50%) translateY(0);}
    50%{transform:translateX(-50%) translateY(-8px);}
}

.start-screen__content{
    position:relative;
    z-index:3;

}

.start-screen__icon{

.start-title{

.start-description{

}

.start-btn{
    display:inline-block;

.start-btn:hover{

}

.start-btn:active{

</style>
</head>

<script>
const questions = [
    {
        q:"試合で一番楽しい瞬間は？",
        c:["味方への決定的なパス","相手を抜く瞬間","ゴールを決める瞬間","ボールを奪う瞬間"]
    },
    {
        q:"チームで任されたい役割は？",
        c:["ゲームメイカー","チャンスメイカー","エースストライカー","守備の中心"]
    },
    {
        q:"成長させたい能力は？",
        c:["視野・パス","ドリブル","決定力","守備力"]
    },
    {
        q:"サッカーで一番大切なのは？",
        c:["チームを動かす","個で打開する","得点を取る","失点を防ぐ"]
    },
    {
        q:"同点の終盤でボールを持ったら？",
        c:["味方を活かす","仕掛ける","ゴールを狙う","ボールを失わない"]
    },
    {
        q:"監督から褒められたいのは？",
        c:["判断力","技術力","得点力","守備力"]
    },
    {
        q:"好きな練習は？",
        c:["パス練習","ドリブル練習","シュート練習","守備練習"]
    },
    {
        q:"チームメイトから言われたい言葉は？",
        c:["試合を作ってくれる","何かしてくれそう","点を取ってくれる","安心して任せられる"]
    },
    {
        q:"理想の選手像は？",
        c:["チームを支配する選手","観客を沸かせる選手","ゴールを量産する選手","チームを支える選手"]
    },
    {
        q:"能力を一つ伸ばせるなら？",
        c:["戦術理解・視野","ドリブル技術","シュート技術","守備能力"]
    }
];

const scores = {
    Q1:{
        A:[3,0,0,0,0,1],
        B:[0,3,0,0,0,0],
        C:[0,0,3,0,0,0],
        D:[0,0,0,3,1,0]
    },
    Q2:{
        A:[3,0,0,0,0,2],
        B:[0,3,0,0,0,0],
        C:[0,0,3,0,0,1],
        D:[0,0,0,3,1,2]
    },
    Q3:{

let idx = 0;

// 「診断を始める」ボタンが押されたときの処理
function startDiagnosis(){
    document.getElementById("startScreen").classList.add("is-hidden");
    document.getElementById("quizArea").classList.remove("is-hidden");
    render();
}

function render(){
    document.getElementById("question").innerText = "Q" + (idx + 1) + " " + questions[idx].q;

    document.getElementById("progressText").innerText = "Q" + (idx + 1) + " / " + questions.length;

    const progress = ((idx + 1) / questions.length) * 100;
    document.getElementById("progressFill").style.width = progress + "%";

    let html = "";

    ["A","B","C","D"].forEach((key,i)=>{
        html += `
            <button class="choice-btn" onclick="answer('${key}')">
                <span class="choice-label">${key}</span>
                <span class="choice-text">${questions[idx].c[i]}</span>
            </button>
        `;
    });

    document.getElementById("choices").innerHTML = html;
}

function answer(choice){
    const add = scores["Q" + (idx + 1)][choice];

    me = me.map((v,i)=>v + add[i]);

    idx++;

    if(idx < questions.length){
        render();
    }else{
        finish();
    }
}

function finish(){
    document.getElementById("choices").innerHTML = "";
    document.getElementById("question").innerText = "診断結果";

    let best = "";
    let bestDist = Infinity;

    for(const [name, value] of Object.entries(players)){
        let distance = 0;

        for(let i=0; i<6; i++){
            distance += (me[i] - value[i]) ** 2;
        }

        if(distance < bestDist){
            bestDist = distance;
            best = name;
        }
    }

const abilityNames = ["パス","ドリブル","シュート","守備","運動量","リーダーシップ"];

const abilityHtml = abilityNames.map((name,i)=>{

    return `

            <div class="ability-bar">
                <div class="ability-bar-fill" style="width:${percent}%"></div>
            </div>
        </div>
    `;
}).join("");
