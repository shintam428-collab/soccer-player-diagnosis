<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>あなたが目指すべき選手診断</title>
</head>
<body>

<h1>あなたが目指すべき選手診断</h1>

<p id="question">Q1 試合で一番楽しい瞬間は？</p>

<button onclick="answer('A')">A</button>
<button onclick="answer('B')">B</button>
<button onclick="answer('C')">C</button>
<button onclick="answer('D')">D</button>

<h2 id="result"></h2>

<script>

const questions = [
"Q1 試合で一番楽しい瞬間は？",
"Q2 チームで任されたい役割は？",
"Q3 成長させたい能力は？",
"Q4 サッカーで一番大切なのは？",
"Q5 同点終盤でボールを持ったら？",
"Q6 監督から褒められたいのは？",
"Q7 好きな練習は？",
"Q8 チームメイトから言われたい言葉は？",
"Q9 理想の選手像は？",
"Q10 能力を1つ伸ばせるなら？"
];

let step = 0;

let pass = 0;
let dribble = 0;
let shoot = 0;
let defense = 0;

function answer(choice){

    if(choice === "A") pass += 3;
    if(choice === "B") dribble += 3;
    if(choice === "C") shoot += 3;
    if(choice === "D") defense += 3;

    step++;

    if(step < questions.length){

        document.getElementById("question").innerText =
        questions[step];

    }else{

        let player = "";

        let maxScore = Math.max(pass, dribble, shoot, defense);

        if(maxScore === pass){
            player = "デブライネ";
        }
        else if(maxScore === dribble){
            player = "ヴィニシウス";
        }
        else if(maxScore === shoot){
            player = "ハーランド";
        }
        else{
            player = "ファンダイク";
        }

        document.getElementById("question").innerText =
        "診断終了";

        document.getElementById("result").innerHTML =
        "<br>パス：" + pass +
        "<br>ドリブル：" + dribble +
        "<br>シュート：" + shoot +
        "<br>守備：" + defense +
        "<br><br>あなたが目指すべき選手は【" +
        player + "】です！";
    }
}

</script>

</body>
</html>
