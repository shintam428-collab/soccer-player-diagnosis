<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>あなたが目指すべき選手診断</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f9b0f,#006400);
    color:white;
    text-align:center;
    padding:20px;
    min-height:100vh;
}

h1{
    font-size:36px;
    margin-bottom:10px;
}

.card{
    background:white;
    color:black;
    max-width:800px;
    margin:20px auto;
    padding:25px;
    border-radius:18px;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

#question{
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}

button{
    display:block;
    width:90%;
    max-width:500px;
    margin:12px auto;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    color:white;
}

button:hover{
    transform:scale(1.04);
}

button:nth-child(1){
    background:#3498db;
}

button:nth-child(2){
    background:#e67e22;
}

button:nth-child(3){
    background:#e74c3c;
}

button:nth-child(4){
    background:#2c3e50;
}

#result{
    margin-top:20px;
    font-size:18px;
    line-height:1.7;
}

.player-img{
    width:280px;
    max-width:90%;
    border-radius:18px;
    margin:18px auto;
    display:block;
    box-shadow:0 8px 25px rgba(0,0,0,0.35);
}

.chart-box{
    background:white;
    max-width:800px;
    margin:25px auto;
    padding:20px;
    border-radius:18px;
    display:none;
}

canvas{
    max-width:100%;
}

@media(max-width:600px){
    h1{
        font-size:28px;
    }

    #question{
        font-size:20px;
    }

    button{
        font-size:16px;
    }
}
</style>
</head>

<body>

<h1>⚽ FUTURE PLAYER FINDER ⚽</h1>
<h2>あなたが目指すべき選手診断</h2>

<div class="card">
    <h2 id="question"></h2>
    <div id="choices"></div>
    <div id="result"></div>
</div>

<div class="chart-box" id="chartBox">
    <canvas id="radarChart"></canvas>
</div>

<script>
const questions = [
    {
        q:"試合で一番楽しい瞬間は？",
        c:["味方への決定的なパス","相手を抜く瞬間","ゴールを決める瞬間","ボールを奪う瞬間"]
    },
    {
        q:"チームで任されたい役割は？",
        c:["ゲームメイカー","チャンスメイカー","エースストライカー","守備の中心"]
    },
    {
        q:"成長させたい能力は？",
        c:["視野・パス","ドリブル","決定力","守備力"]
    },
    {
        q:"サッカーで一番大切なのは？",
        c:["チームを動かす","個で打開する","得点を取る","失点を防ぐ"]
    },
    {
        q:"同点の終盤でボールを持ったら？",
        c:["味方を活かす","仕掛ける","ゴールを狙う","ボールを失わない"]
    },
    {
        q:"監督から褒められたいのは？",
        c:["判断力","技術力","得点力","守備力"]
    },
    {
        q:"好きな練習は？",
        c:["パス練習","ドリブル練習","シュート練習","守備練習"]
    },
    {
        q:"チームメイトから言われたい言葉は？",
        c:["試合を作ってくれる","何かしてくれそう","点を取ってくれる","安心して任せられる"]
    },
    {
        q:"理想の選手像は？",
        c:["チームを支配する選手","観客を沸かせる選手","ゴールを量産する選手","チームを支える選手"]
    },
    {
        q:"能力を一つ伸ばせるなら？",
        c:["戦術理解・視野","ドリブル技術","シュート技術","守備能力"]
    }
];

const scores = {
    Q1:{
        A:[3,0,0,0,0,1],
        B:[0,3,0,0,0,0],
        C:[0,0,3,0,0,0],
        D:[0,0,0,3,1,0]
    },
    Q2:{
        A:[3,0,0,0,0,2],
        B:[0,3,0,0,0,0],
        C:[0,0,3,0,0,1],
        D:[0,0,0,3,1,2]
    },
    Q3:{
        A:[3,0,0,0,0,1],
        B:[0,3,0,0,0,0],
        C:[0,0,3,0,0,0],
        D:[0,0,0,3,1,0]
    },
    Q4:{
        A:[2,0,0,0,0,2],
        B:[0,3,0,0,0,0],
        C:[0,0,3,0,0,0],
        D:[0,0,0,3,1,1]
    },
    Q5:{
        A:[3,0,0,0,0,1],
        B:[0,3,0,0,0,0],
        C:[0,0,3,0,0,0],
        D:[0,0,0,2,1,1]
    },
    Q6:{
        A:[2,0,0,0,0,2],
        B:[0,3,0,0,0,0],
        C:[0,0,3,0,0,0],
        D:[0,0,0,3,1,0]
    },
    Q7:{
        A:[3,0,0,0,0,0],
        B:[0,3,0,0,0,0],
        C:[0,0,3,0,0,0],
        D:[0,0,0,3,1,0]
    },
    Q8:{
        A:[3,0,0,0,0,1],
        B:[0,3,0,0,0,0],
        C:[0,0,3,0,0,0],
        D:[0,0,0,3,1,1]
    },
    Q9:{
        A:[3,0,0,0,0,2],
        B:[0,3,0,0,0,0],
        C:[0,0,3,0,0,0],
        D:[0,0,0,3,1,2]
    },
    Q10:{
        A:[3,0,0,0,0,1],
        B:[0,3,0,0,0,0],
        C:[0,0,3,0,0,0],
        D:[0,0,0,3,1,0]
    }
};

const players = {
    "デブライネ":[10,7,8,5,8,8],
    "ヴィニシウス":[5,10,8,4,8,6],
    "ハーランド":[4,6,10,4,7,6],
    "ファンダイク":[5,4,4,10,7,9],
    "カンテ":[6,5,4,10,10,7]
};

const descriptions = {
    "デブライネ":"高い視野と正確なパスで試合を支配する司令塔タイプです。味方を活かすプレーやチャンスメイクに優れています。",
    "ヴィニシウス":"高いドリブル能力と突破力を持つアタッカータイプです。1対1で相手を抜き、試合の流れを変える力があります。",
    "ハーランド":"圧倒的な得点力を持つストライカータイプです。ゴール前での決定力が高く、チームの得点源として活躍できます。",
    "ファンダイク":"守備力とリーダーシップに優れたディフェンダータイプです。冷静な判断と統率力でチームを支える存在です。",
    "カンテ":"豊富な運動量と守備力でチームを支えるミッドフィルダータイプです。ボール奪取や献身的なプレーに優れています。"
};

const playerImages = {
    "デブライネ":"debruyne.jng.png",
    "ヴィニシウス":"vinicius.jng.png",
    "ハーランド":"haaland.jng.png",
    "ファンダイク":"vandijk.jng.png",
    "カンテ":"kante.jng.png"
};

let idx = 0;
let me = [0,0,0,0,0,0];

function render(){
    document.getElementById("question").innerText = "Q" + (idx + 1) + " " + questions[idx].q;

    let html = "";

    ["A","B","C","D"].forEach((key,i)=>{
        html += `<button onclick="answer('${key}')">${questions[idx].c[i]}</button>`;
    });

    document.getElementById("choices").innerHTML = html;
}

function answer(choice){
    const add = scores["Q" + (idx + 1)][choice];

    me = me.map((v,i)=>v + add[i]);

    idx++;

    if(idx < questions.length){
        render();
    }else{
        finish();
    }
}

function finish(){
    document.getElementById("choices").innerHTML = "";
    document.getElementById("question").innerText = "診断結果";

    let best = "";
    let bestDist = Infinity;

    for(const [name, value] of Object.entries(players)){
        let distance = 0;

        for(let i=0; i<6; i++){
            distance += (me[i] - value[i]) ** 2;
        }

        if(distance < bestDist){
            bestDist = distance;
            best = name;
        }
    }

    document.getElementById("result").innerHTML = `
        <h2>🏆 あなたが目指すべき選手は<br>${best} です！</h2>
        <img class="player-img" src="${playerImages[best]}" alt="${best}">
        <p>${descriptions[best]}</p>
        <h3>あなたの能力</h3>
        <p>
        パス：${me[0]}　
        ドリブル：${me[1]}　
        シュート：${me[2]}<br>
        守備：${me[3]}　
        運動量：${me[4]}　
        リーダーシップ：${me[5]}
        </p>
    `;

    document.getElementById("chartBox").style.display = "block";

    new Chart(document.getElementById("radarChart"),{
        type:"radar",
        data:{
            labels:["パス","ドリブル","シュート","守備","運動量","リーダーシップ"],
            datasets:[
                {
                    label:"あなた",
                    data:me,
                    backgroundColor:"rgba(52,152,219,0.25)",
                    borderColor:"rgba(52,152,219,1)",
                    pointBackgroundColor:"rgba(52,152,219,1)"
                },
                {
                    label:best,
                    data:players[best],
                    backgroundColor:"rgba(231,76,60,0.25)",
                    borderColor:"rgba(231,76,60,1)",
                    pointBackgroundColor:"rgba(231,76,60,1)"
                }
            ]
        },
        options:{
            responsive:true,
            scales:{
                r:{
                    suggestedMin:0,
                    suggestedMax:30
                }
            }
        }
    });
}

render();
</script>

</body>
</html>
