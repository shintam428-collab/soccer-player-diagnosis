            } catch (error) {
                console.log("Optional ability CSV skipped:", label, path, error);
                return [];
            }
        };

        const [abilitiesRows, positionRows, additionalRows, baseRows, radarMapRows] = await Promise.all([

    function parseAbilities20(rows) {
        const headerIndex = rows.findIndex((row) => row.some((cell) => ["ability", "ability_name", "能力", "能力名", "細かい能力"].includes(normalizeCell(cell))));
        if (headerIndex >= 0) {
            const headers = rows[headerIndex].map(normalizeCell);
            const abilityColumn = ["ability", "ability_name", "能力", "能力名", "細かい能力"].find((header) => headers.includes(header));
            const parsed = rows.slice(headerIndex + 1)
                .map((row) => rowToObject(headers, row))
                .map((row) => normalizeAbilityName(row[abilityColumn]))
                .filter((value) => value && !isMetaPlaystyleColumn(value));
            const uniqueParsed = unique(parsed);
            if (uniqueParsed.length >= 6) return uniqueParsed;
        }
        const found = rows.flat().map(normalizeAbilityName).filter((value) => ability20Names.includes(value));
        const uniqueFound = unique(found);
        return uniqueFound.length >= 20 ? ability20Names.filter((name) => uniqueFound.includes(name)) : ability20Names;
    }

    function parseBaseAbilityNames(rows, fileName = "base_ability_values.csv") {
        if (!rows || !rows.length) return [];
        const positionColumns = ["position", "ポジション", "ポジション名", "ポジション分類", "position_name", "position_group", "pos"];
        const playstyleColumns = ["playstyle", "style", "プレースタイル", "プレイスタイル", "プレースタイル名", "プレイスタイル名", "スタイル", "型", "タイプ"];
        const headerInfo = findFlexibleHeaderRow(rows, [positionColumns, playstyleColumns]);
        if (!headerInfo) return [];
        const metaColumns = new Set([...positionColumns, ...playstyleColumns]);
        const abilityNames = headerInfo.headers
            .map(normalizeAbilityName)
            .filter((header) => header && !metaColumns.has(header) && !isMetaPlaystyleColumn(header));
        console.log(`${fileName} ability columns:`, abilityNames);
        return unique(abilityNames);
    }

    function parseBaseAbilities(rows, abilities, fileName = "question_templates.csv") {
        if (!rows || !rows.length) throw new Error(`${fileName} format error: CSVが空です`);
        const positionColumns = ["position", "ポジション", "ポジション名", "ポジション分類", "position_name", "position_group", "pos"];
        const playstyleColumns = ["playstyle", "style", "プレースタイル", "プレイスタイル", "プレースタイル名", "プレイスタイル名", "スタイル", "型", "タイプ"];
        const headerInfo = findFlexibleHeaderRow(rows, [positionColumns, playstyleColumns]);
        if (!headerInfo) throw new Error(`${fileName} format error: ポジション列（例: ポジション / ポジション名 / ポジション分類）とプレースタイル列（例: プレースタイル / プレイスタイル / プレースタイル名）が見つかりません`);
        const headerIndex = headerInfo.index;
        const headers = rows[headerIndex].map(normalizeCell);
        const positionColumn = findHeaderAlias(headers, positionColumns);
        const playstyleColumn = findHeaderAlias(headers, playstyleColumns);
        const parsedRows = rows.slice(headerIndex + 1)
            .map((row) => rowToObject(headers, row))
            .filter((row) => row[positionColumn] && row[playstyleColumn])
            .map((row) => ({
                position: row[positionColumn],
                playstyle: row[playstyleColumn],
                scores: Object.fromEntries(abilities.map((ability) => [ability, clamp(Number(getAbilityRowValue(row, ability)) || 0)]))
            }));
        if (!parsedRows.length) {
            throw new Error(`${fileName} format error: 有効なポジション×プレースタイル行が見つかりません`);
        }
        return parsedRows;
    }

    function getAbilityRowValue(row, ability) {
        if (row[ability] !== undefined) return row[ability];
        const aliasEntry = Object.entries(abilityNameAliases).find(([, normalized]) => normalized === ability);
        if (aliasEntry && row[aliasEntry[0]] !== undefined) return row[aliasEntry[0]];
        return "";
    }

    function parsePositionPlaystyles(rows) {
        let headerIndex = findHeaderRow(rows, ["position"]);
        if (headerIndex < 0) headerIndex = findHeaderRow(rows, ["ポジション"]);
        if (headerIndex < 0) throw new Error("position_playstyles.csv format error: position または ポジション 列が見つかりません");
        const headers = rows[headerIndex].map(normalizeCell);
        const objects = rows.slice(headerIndex + 1).map((row) => rowToObject(headers, row));
        const map = {};
        objects.forEach((row) => {
            const position = normalizePositionCode(row.position || row["ポジション"]);
            const playstyle = row.playstyle || row["プレースタイル"] || row["プレイスタイル"] || row["プレースタイル名"] || row["プレイスタイル名"] || row.style;
            if (!position) return;
            if (!map[position]) map[position] = [];
            if (isValidPlaystyleName(playstyle) && !map[position].includes(playstyle)) map[position].push(playstyle);
            headers.forEach((header) => {
                if (["position", "ポジション", "playstyle", "プレースタイル", "プレイスタイル", "プレースタイル名", "プレイスタイル名", "style"].includes(header)) return;
                if (isMetaPlaystyleColumn(header)) return;
                const value = normalizeCell(row[header]);
                if (isValidPlaystyleName(value) && !map[position].includes(value)) map[position].push(value);
            });
        });
        if (!Object.keys(map).length) {
            throw new Error("position_playstyles.csv format error: ポジションまたはプレースタイルの有効な行が見つかりません");
        }
        return map;
    }

    function normalizePositionCode(position) {
        const value = normalizeCell(position).toUpperCase();
        const aliases = {
            "トップ下": "OMF",
            "ボランチ": "CMF",
            "アンカー": "DMF",
            "攻撃型SB": "SB",
            "守備型SB": "SB",
            "サイド": "SA"
        };
        return aliases[normalizeCell(position)] || value;
    }

    function isMetaPlaystyleColumn(header) {
        const name = normalizeCell(header).toLowerCase();
        return !name || ["id", "no", "number", "score", "point", "points", "value", "order"].includes(name) || /番号|点数|得点|スコア|順番|並び|id/i.test(name);
    }

    function isValidPlaystyleName(value) {
        const textValue = normalizeCell(value);
        if (!textValue) return false;
        if (/^[+-]?\d+(\.\d+)?$/.test(textValue)) return false;
        if (/^(id|no|score|point|points|value|order)$/i.test(textValue)) return false;
        if (/^(番号|点数|得点|スコア|順番|並び)$/.test(textValue)) return false;
        return true;
    }

    function parseAdditionalQuestions(rows) {
        const headerIndex = rows.findIndex((row) => row.some((cell) => ["question", "質問", "質問文"].includes(normalizeCell(cell))));
        if (headerIndex >= 0) {
            const headers = rows[headerIndex].map(normalizeCell);
            const questions = rows.slice(headerIndex + 1)
                .map((row) => rowToObject(headers, row))
                .map((row) => row.question || row["質問"] || row["質問文"])
                .map(normalizeCell)
                .filter(Boolean);
            if (questions.length) return questions.slice(0, 5);
        }
        const flatQuestions = rows.flat().map(normalizeCell).filter((value) => value && !["question", "質問", "質問文"].includes(value));
        const questions = flatQuestions.filter((value) => value.includes("？") || value.includes("?"));
        return (questions.length ? questions : defaultAdditionalQuestions).slice(0, 5);
    }

    function parseAbilitySelectMap(rows, abilities) {
        const headerIndex = rows.findIndex((row) => row.some((cell) => ["選択項目", "item", "label", "select_item", "能力選択"].includes(normalizeCell(cell))));
        if (headerIndex < 0) return {};
        const headers = rows[headerIndex].map(normalizeCell);
        const map = {};
        rows.slice(headerIndex + 1).map((row) => rowToObject(headers, row)).forEach((row) => {
            const item = normalizeAbilityDisplayName(row["選択項目"] || row["能力選択"] || row.item || row.label || row.name || row.select_item || row.category);
            const abilityText = row["細かい能力"] || row["能力"] || row.abilities || row.ability || row.ability_name || row.targets;
            if (!item || !abilityText) return;
            const targets = abilityText.split(/[、,\/]/).map(normalizeCell).filter(Boolean);
            if (!targets.length) return;
            if (!map[item]) map[item] = [];
            targets.forEach((target) => {
                if (!map[item].includes(target)) map[item].push(target);
            });
        });
        return map;
    }

    function normalizeAbilitySelectMap(map, abilities) {
        const normalizedMap = {};
        const sourceMap = Object.keys(map).length ? map : defaultAbilitySelectMap;
        Object.entries(sourceMap).forEach(([item, targets]) => {
            const displayItem = normalizeAbilityDisplayName(item);
            const normalizedTargets = targets
                .flatMap((target) => expandAbilityTarget(target))
                .map(normalizeAbilityName)
                .filter((target) => abilities.includes(target));
            if (!normalizedTargets.length) return;
            if (!normalizedMap[displayItem]) normalizedMap[displayItem] = [];
            normalizedTargets.forEach((target) => {
                if (!normalizedMap[displayItem].includes(target)) normalizedMap[displayItem].push(target);
            });
        });
        return Object.keys(normalizedMap).length ? normalizedMap : defaultAbilitySelectMap;
    }

    function filterAbilitySelectMap(map) {
        const filtered = { ...map };
        delete filtered["スピード"];
        delete filtered["パスを受ける動き"];
        delete filtered["オフザボール"];
        filtered["足の速さ"] = ["最高速度", "推進力"];
        filtered["アジリティー"] = ["瞬発力"];
        return filtered;
    }

    function expandAbilityTarget(target) {
        const original = normalizeCell(target);
        const normalized = normalizeAbilityName(original);
        if (original === "パス") return ["パス", "グランダーパス", "ロングパス", "パス精度", "アイデア"];
        if (original === "センス") return ["センス", "アイデア"];
        if (original === "足の速さ") return ["最高速度", "推進力"];
        if (original === "アジリティー") return ["瞬発力"];
        if (original === "パスを受ける動き" || original === "オフザボール") return ["ポジショニング"];
        return [normalized];
    }

    function normalizeAbilityDisplayName(value) {
        const textValue = normalizeCell(value);
        return textValue === "パスを受ける動き" || textValue === "オフザボール" ? "ポジショニング" : textValue;
    }

    function parseRadarMap(rows, abilities) {
        const headerIndex = rows.findIndex((row) => row.some((cell) => ["radar", "radar_item", "項目", "大項目", "分類"].includes(normalizeCell(cell))));
        if (headerIndex < 0) return radarItemGroups;
        const headers = rows[headerIndex].map(normalizeCell);
        const map = {};
        rows.slice(headerIndex + 1).map((row) => rowToObject(headers, row)).forEach((row) => {
            const radar = normalizeRadarName(row.radar || row.radar_item || row["項目"] || row["大項目"] || row["分類"]);
            const abilityText = row.abilities || row["細かい能力"] || row["能力"] || row.ability || row.ability_name;
            if (!radar || !abilityText) return;
            const targets = abilityText.split(/[、,\/]/)
                .flatMap((value) => expandAbilityTarget(value))
                .map(normalizeAbilityName)
                .filter((value) => abilities.includes(value));
            if (!targets.length) return;
            if (!map[radar]) map[radar] = [];
            targets.forEach((target) => {
                if (!map[radar].includes(target)) map[radar].push(target);
            });
        });
        return Object.keys(map).length ? map : radarItemGroups;
    }

    async function fetchAbilityCsvRows(path, label) {
        const url = `${path}?v=${Date.now()}`;
        console.log("Ability CSV load start:", label, url);
        const response = await fetch(url);
        console.log("Ability CSV fetch result:", label, url, response.status, response.ok);
        if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
        const rows = parseCsv((await response.text()).replace(/^\uFEFF/, ""));
        console.log("Ability CSV rows:", label, rows.length);
        return rows;
    }

    async function fetchFirstAvailableAbilityCsv(candidates) {
        const failures = [];
        for (const candidate of candidates) {
            try {
                return {
                    label: candidate.label,
                    path: candidate.path,
                    rows: await fetchAbilityCsvRows(candidate.path, candidate.label)
                };
            } catch (error) {
                failures.push(`${candidate.label}（${candidate.path}）`);
                console.log("Alternative ability CSV failed:", candidate.label, candidate.path, error);
            }
        }
        console.log("No ability select CSV loaded:", failures.join(" / "));
        return { label: "", path: "", rows: [] };
    }

    async function fetchCsvRows(path, errorMessage) {
        const url = `${path}?v=${Date.now()}`;
        console.log("CSV load start:", url);
        try {
            const response = await fetch(url);
            console.log("CSV fetch result:", url, response.status, response.ok);
            if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
            const rows = parseCsv((await response.text()).replace(/^\uFEFF/, ""));
            console.log("CSV rows:", path, rows.length);
            return rows;
        } catch (error) {
            loadErrors.push(errorMessage);
            throw error;
        }
    }

    function parseCsv(textValue) {
        const rows = [];
        let row = [];
        let cell = "";
        let inQuotes = false;
        for (let i = 0; i < textValue.length; i++) {
            const char = textValue[i];
            const next = textValue[i + 1];
            if (char === '"' && inQuotes && next === '"') { cell += '"'; i++; continue; }
            if (char === '"') { inQuotes = !inQuotes; continue; }
            if (char === "," && !inQuotes) { row.push(cell); cell = ""; continue; }
            if ((char === "\n" || char === "\r") && !inQuotes) {
                if (char === "\r" && next === "\n") i++;
                row.push(cell); rows.push(row); row = []; cell = ""; continue;
            }
            cell += char;
        }
        if (cell !== "" || row.length) { row.push(cell); rows.push(row); }
        return rows.filter((items) => items.some((item) => normalizeCell(item) !== ""));
    }

    function findHeaderRow(rows, requiredColumns) {
        return rows.findIndex((row) => {
            const normalized = row.map(normalizeCell);
            return requiredColumns.every((column) => normalized.includes(column));
        });
    }

    function findFlexibleHeaderRow(rows, requiredColumnGroups) {
        for (let index = 0; index < rows.length; index++) {
            const normalized = rows[index].map(normalizeCell);
            const hasAllGroups = requiredColumnGroups.every((aliases) => aliases.some((alias) => normalized.includes(alias)));
            if (hasAllGroups) return { index, headers: normalized };
        }
        return null;
    }

    function findHeaderAlias(headers, aliases) {
        return aliases.find((alias) => headers.includes(alias)) || "";
    }

    function rowToObject(headers, row) {
        const object = {};
        headers.forEach((header, index) => {
            if (header) object[header] = normalizeCell(row[index] || "");
        });
        return object;
    }

    function createChoiceKey(index) {
        return String.fromCharCode(65 + index);
    }

    function loadTypeScorePersonalityQuestions(rows, headerIndex, headers, typeScoreColumns) {
        const questionMap = new Map();
        rows.slice(headerIndex + 1)
            .map((row) => rowToObject(headers, row))
            .filter((row) => row.question_id && row.question && row.choice && row.choice_text)
            .forEach((row, rowIndex) => {
                const questionKey = row.question_id;
                if (!questionMap.has(questionKey)) {
                    questionMap.set(questionKey, {
                        section: "personality",
                        id: row.question_id,
                        question: row.question,
                        csvOrder: rowIndex,
                        choices: []
                    });
                }

                const scores = {};
                typeScoreColumns.forEach((typeName) => {
                    scores[typeName] = Number(normalizeCell(row[typeName])) || 0;
                });

                questionMap.get(questionKey).choices.push({
                    key: row.choice,
                    text: row.choice_text,
                    scores
                });
            });
        return [...questionMap.values()].sort((a, b) => a.csvOrder - b.csvOrder);
    }

    function loadJapanesePersonalityQuestions(rows, headerIndex, headers, typeNames) {
        const noIndex = headers.indexOf("No");
        const questionIndex = headers.indexOf("質問");
        const answerIndex = headers.indexOf("回答");
        const scoreIndex = headers.indexOf("配点");
        const questionMap = new Map();
        let lastQuestionNo = "";
        let lastQuestionText = "";

        rows.slice(headerIndex + 1).forEach((row, rowIndex) => {
            const no = normalizeCell(noIndex >= 0 ? row[noIndex] : "");
            const questionText = normalizeCell(row[questionIndex]) || lastQuestionText;
            let answerText = normalizeCell(row[answerIndex]);
            let scoreText = normalizeCell(row[scoreIndex]);
            if (looksLikePersonalityScore(answerText) && scoreText && !looksLikePersonalityScore(scoreText)) {
                const originalAnswerText = answerText;
                answerText = scoreText;
                scoreText = originalAnswerText;
            }
            if (!questionText || !answerText) return;
            if (looksLikePersonalityScore(answerText)) return;

            lastQuestionNo = no || lastQuestionNo || `Q${questionMap.size + 1}`;
            lastQuestionText = questionText;
            const questionKey = lastQuestionNo;

            if (!questionMap.has(questionKey)) {
                questionMap.set(questionKey, {
                    section: "personality",
                    id: no || lastQuestionNo || `Q${questionMap.size + 1}`,
                    question: questionText,
                    csvOrder: rowIndex,
                    choices: []
                });
            }

            questionMap.get(questionKey).choices.push({
                key: createChoiceKey(questionMap.get(questionKey).choices.length),
                text: answerText,
                scoreText,
                scores: parsePersonalityScoreText(scoreText, typeNames)
            });
        });

        return [...questionMap.values()].sort((a, b) => a.csvOrder - b.csvOrder);
    }

    function getPersonalityQuestionText(row) {
        return row["質問"] || row.question || row["question"] || "";
    }

    function getPersonalityChoiceText(row, headers) {
        const preferredColumns = ["回答", "choice_text", "回答文", "回答内容", "選択肢", "選択肢文"];
        for (const column of preferredColumns) {
            const value = normalizeCell(row[column]);
            if (value && !looksLikePersonalityScore(value)) return value;
        }

        const ignoredColumns = new Set(["No", "no", "番号", "question_id", "質問", "question", "配点", "score", "scores"]);
        const fallbackColumn = headers.find((header) => {
            const value = normalizeCell(row[header]);
            return value && !ignoredColumns.has(header) && !looksLikePersonalityScore(value);
        });
        return fallbackColumn ? normalizeCell(row[fallbackColumn]) : "";
    }

    function getPersonalityScoreText(row) {
        return row["配点"] || row.score || row.scores || "";
    }

    function looksLikePersonalityScore(value) {
        const textValue = normalizeScoreText(value);
        if (!textValue) return false;
        if (/^[+-]?\d+(\.\d+)?$/.test(textValue)) return true;
        const hasScoreNumber = /[+-]\d/.test(textValue);
        const hasTypeName = personalityTypes.some((type) => textValue.includes(type.typeName));
        return hasScoreNumber && hasTypeName;
    }

    function parsePersonalityScoreText(scoreText, typeNames) {
        const scores = Object.fromEntries(typeNames.map((typeName) => [typeName, 0]));
        const source = normalizeScoreText(scoreText);
        if (!source) return scores;

        typeNames.forEach((typeName) => {
            const escapedName = escapeRegExp(typeName);
            const match = source.match(new RegExp(`${escapedName}\\s*([+-]\\s*\\d+|\\d+)`));
            if (match) scores[typeName] = Number(match[1]) || 0;
        });
        return scores;
    }

    function createLegacyPersonalityScores(value, typeNames) {
        const scores = Object.fromEntries(typeNames.map((typeName) => [typeName, 0]));
        personalityTypes.forEach((type) => {
            if (type.axes.includes(value)) scores[type.typeName] = 1;
        });
        return scores;
    }

    function escapeRegExp(value) {
        return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function normalizeScoreText(value) {
        return normalizeCell(value)
            .replace(/＋/g, "+")
            .replace(/−|ー|－/g, "-")
            .replace(/、/g, ",")
            .replace(/\s+/g, "");
    }

    function selectChoiceForCurrentQuestion(questionDomKey, choiceKey, clickedButton) {
        if (clickedButton && typeof clickedButton.blur === "function") clickedButton.blur();

    function updateQuestionSelection(questionDomKey, choiceKey) {
        const card = document.querySelector(`[data-question-key="${cssEscape(questionDomKey)}"]`);
        if (!card) return;
        card.querySelectorAll(".choice-btn, .answer-button, .choice-button, .option-button").forEach((button) => {
            button.classList.remove("selected", "active", "focus", "is-selected");
        });
        const selectedButton = card.querySelector(`.choice-btn[data-choice-key="${cssEscape(choiceKey)}"]`);
        if (selectedButton) selectedButton.classList.add("is-selected", "selected");
    }

    function scrollAfterAnswer(questionDomKey) {
        const cards = [...document.querySelectorAll(".question-card")];
        const currentIndex = cards.findIndex((card) => card.dataset.questionKey === questionDomKey);
        if (currentIndex < 0) return;
        const nextCard = cards[currentIndex + 1];
        if (nextCard) {
            scrollToElementWithOffset(nextCard);
            return;
        }
        const actionButton = document.querySelector(".next-page-btn");
        if (actionButton) scrollToElementWithOffset(actionButton);
    }

    function getHeaderOffset() {
        const header = document.querySelector(".site-header, header, .top-nav, .global-nav");
        const headerHeight = header ? header.getBoundingClientRect().height : 0;
        const extraMargin = window.innerWidth <= 600 ? 24 : 16;
        return headerHeight + extraMargin;
    }

    function scrollToElementWithOffset(element) {
        if (!element) return;
        const offset = getHeaderOffset();
        const targetTop = element.getBoundingClientRect().top + window.scrollY - offset;
        window.scrollTo({
            top: Math.max(0, targetTop),
            behavior: "smooth"
        });
    }

    function submitPlaystylePage() {
        if (!validateQuestionsAnswered(personalityQuestions)) return;

    function validateQuestionsAnswered(questions) {
        const missing = questions.find((question) => !getSelectedAnswer(question));
        const message = $("pageMessage");
        if (!missing) {
            if (message) message.classList.remove("is-visible");
            return true;
        }
        if (message) message.classList.add("is-visible");
        const card = document.querySelector(`[data-question-key="${cssEscape(getQuestionDomKey(missing))}"]`);
        if (card) scrollToElementWithOffset(card);
        return false;
    }

    function getSelectedAnswer(question) {

    }

    function cssEscape(value) {
        if (window.CSS && typeof window.CSS.escape === "function") return window.CSS.escape(value);
        return String(value).replace(/["\\]/g, "\\$&");

    function clearChoiceButtonStates() {

    function blurActiveButton() {
        const activeElement = document.activeElement;
        if (!activeElement) return;

        }
        if (typeof activeElement.blur === "function") activeElement.blur();

    function judgePersonality() {
        const typeNames = personalityTypes.map((type) => type.typeName);
        const typeScores = Object.fromEntries(typeNames.map((typeName) => [typeName, 0]));
        let hasTypeScore = false;

        personalityQuestions.forEach((question) => {
            const selected = question.choices.find((choice) => choice.key === personalityAnswers[question.id]);
            if (!selected?.scores) return;
            hasTypeScore = true;
            typeNames.forEach((typeName) => {
                typeScores[typeName] += Number(selected.scores[typeName]) || 0;
            });
        });

        if (hasTypeScore) {
            const bestType = personalityTypes.reduce((best, type) => {
                if (!best) return type;
                return (typeScores[type.typeName] || 0) > (typeScores[best.typeName] || 0) ? type : best;
            }, null);
            return { axes: [], key: bestType?.typeName || "", scores: typeScores };
        }

        return { axes: [], key: "", scores: typeScores };
    }

    function calculateAbilityScores() {
        const data = abilityMeasurementData;
        const baseRow = findBaseAbilityRow();
        if (!baseRow) {
            throw new Error(`基礎能力値が見つかりません: base_ability_values.csv に「${abilityMeasurementState.position} / ${abilityMeasurementState.playstyle}」の行がありません。`);
        }
        const baseScores = baseRow.scores;
        const additionalTotal = Object.values(abilityMeasurementState.additionalAnswers).reduce((sum, value) => sum + (Number(value) || 0), 0);
        const strengthAbilities = getStrengthAbilitySet();
        const weaknessAbilities = getWeaknessAbilitySet();
        const scores = {};

        data.abilities.forEach((ability) => {
            const baseValue = Number(baseScores[ability]) || 0;
            const rating = Number(abilityMeasurementState.ratings[ability]) || 0;
            const multiplier = strengthAbilities.has(ability) ? 3 : weaknessAbilities.has(ability) ? 0.5 : 1;
            scores[ability] = clamp(baseValue + additionalTotal + rating * multiplier);
        });
        return scores;
    }

    function findBaseAbilityRow() {
        const normalizeKey = (value) => normalizeCell(value).replace(/\s+/g, "");
        const selectedPositions = getBasePositionCandidates(abilityMeasurementState.position, abilityMeasurementState.playstyle).map(normalizeKey);
        const selectedPlaystyle = normalizeKey(abilityMeasurementState.playstyle);
        return abilityMeasurementData.baseAbilities.find((row) => {
            return selectedPositions.includes(normalizeKey(row.position)) && normalizeKey(row.playstyle) === selectedPlaystyle;
        }) || null;
    }

    function getBasePositionCandidates(position, playstyle = "") {
        const code = normalizePositionCode(position);
        const style = normalizeCell(playstyle);
        const sbType = getSbCalculationType(style);
        const candidatesByCode = {
            CF: ["CF", "センターフォワード", "フォワード"],
            OMF: ["OMF", "トップ下"],
            WG: ["WG", "ウイング", "ウィング", "RWG", "LWG"],
            SA: ["SA", "サイド", "RMF", "LMF"],
            WB: ["WB", "ウィングバック", "ウイングバック"],
            CMF: ["CMF", "ボランチ"],
            DMF: ["DMF", "アンカー"],
            SB: ["SB", sbType, "サイドバック"],
            CB: ["CB", "センターバック"],
            GK: ["GK", "ゴールキーパー"]
        };
        return unique([code, ...(candidatesByCode[code] || [])]);
    }

    function getStrengthAbilitySet() {
        const data = abilityMeasurementData;
        const strengthAbilities = new Set();
        abilityMeasurementState.strengths.forEach((item) => {
            const targets = data.selectMap[item] || defaultAbilitySelectMap[item] || [];
            targets
                .flatMap((target) => expandAbilityTarget(target))
                .map(normalizeAbilityName)
                .filter((target) => data.abilities.includes(target))
                .forEach((target) => strengthAbilities.add(target));
        });
        return strengthAbilities;
    }

    function getWeaknessAbilitySet() {
        const data = abilityMeasurementData;
        const weaknessAbilities = new Set();
        abilityMeasurementState.weaknesses.forEach((item) => {
            const targets = data.selectMap[item] || defaultAbilitySelectMap[item] || [];
            targets
                .flatMap((target) => expandAbilityTarget(target))
                .map(normalizeAbilityName)
                .filter((target) => data.abilities.includes(target))
                .forEach((target) => weaknessAbilities.add(target));
        });
        return weaknessAbilities;
    }

    function convertToRadarScores(scores) {
        const radarScores = {};
        const groups = abilityMeasurementData?.radarMap || radarItemGroups;
        Object.entries(groups).forEach(([name, items]) => {
            const displayName = normalizeRadarName(name);
            const validItems = items.filter((item) => Object.prototype.hasOwnProperty.call(scores, item));
            const targetItems = validItems.length ? validItems : items;
            const total = targetItems.reduce((sum, item) => sum + (Number(scores[item]) || 0), 0);
            radarScores[displayName] = clamp(Math.round(total / targetItems.length));
        });
        return radarScores;
    }

    function calculateOverallScore(radarScores) {
        const positionKey = getOverallPositionKey(abilityMeasurementState.position, abilityMeasurementState.playstyle);
        const weights = overallWeightsByPosition[positionKey] || overallWeightsByPosition["ボランチ"];
        const total = Object.entries(weights).reduce((sum, [item, weight]) => {
            const value = getRadarScoreValue(radarScores, item);
            return sum + value * weight;
        }, 0);
        return clamp(total);
    }

    function getRadarScoreValue(radarScores, item) {
        return Number(radarScores[item] ?? radarScores[normalizeRadarName(item)] ?? 0);
    }

    function getOverallPositionKey(position, playstyle = "") {
        const code = normalizePositionCode(position);
        if (code === "CF") return "CF";
        if (code === "OMF") return "トップ下";
        if (code === "WG") return "WG";
        if (code === "SA") return "サイド";
        if (code === "WB") return "WB";
        if (code === "CMF") return "ボランチ";
        if (code === "DMF") return "アンカー";
        if (code === "SB") return getSbCalculationType(playstyle);
        if (code === "CB") return "CB";
        if (code === "GK") return "GK";
        const value = `${normalizeCell(position)} ${normalizeCell(playstyle)}`.replace(/\s+/g, "");
        if (/GK|ゴールキーパー/i.test(value)) return "GK";
        if (/CB|センターバック|センター?バック/i.test(value)) return "CB";
        if (/守備型.*(SB|サイドバック)|守備.*(SB|サイドバック)/i.test(value)) return "守備型SB";
        if (/攻撃型.*(SB|サイドバック)|攻撃.*(SB|サイドバック)/i.test(value)) return "攻撃型SB";
        if (/WB|ウィングバック|ウイングバック/i.test(value)) return "WB";
        if (/アンカー/i.test(value)) return "アンカー";
        if (/ボランチ|CMF|DMF/i.test(value)) return "ボランチ";
        if (/トップ下|OMF/i.test(value)) return "トップ下";
        if (/WG|ウイング|ウィング/i.test(value)) return "WG";
        if (/CF|センターフォワード|フォワード/i.test(value)) return "CF";
        if (/サイド|RMF|LMF|RWG|LWG/i.test(value)) return "サイド";
        return "ボランチ";
    }

    function getSbCalculationType(playstyle = "") {
        const style = normalizeCell(playstyle).replace(/\s+/g, "");
        if (/対人守備|ビルドアップ|守備/i.test(style)) return "守備型SB";
        if (/インナーラップ|オーバーラップ|クロス|攻撃/i.test(style)) return "攻撃型SB";
        return "攻撃型SB";
    }

    function normalizeRadarName(name) {
        const value = normalizeCell(name);
        return value === "スピード" ? "足の速さ" : value;
    }

    function drawRadarChart(scores) {
        const canvas = $("radarChart");
        const chartBox = $("chartBox");
        const ctx = canvas.getContext("2d");
        const labels = Object.keys(scores);
        const values = labels.map((label) => clamp(scores[label] || 0));
        const isPlayerCardChart = Boolean(canvas.closest(".ability-player-card"));
        const maxChartSize = isPlayerCardChart ? 170 : 320;
        const minChartSize = isPlayerCardChart ? 130 : 240;
        const size = Math.min(maxChartSize, Math.max(minChartSize, chartBox.clientWidth || 300));
        const scale = window.devicePixelRatio || 1;
        const center = size / 2;
        const radius = size * (isPlayerCardChart ? 0.41 : 0.34);
        chartBox.style.display = "block";
        canvas.width = size * scale;
        canvas.height = size * scale;
        canvas.style.width = `${size}px`;
        canvas.style.height = `${size}px`;
        ctx.setTransform(scale, 0, 0, scale, 0, 0);
        ctx.clearRect(0, 0, size, size);
        ctx.strokeStyle = isPlayerCardChart ? "rgba(255,255,255,0.18)" : "rgba(148,163,184,0.55)";
        ctx.lineWidth = 1;
        for (let level = 1; level <= 5; level++) drawRadarShape(ctx, labels.length, center, radius * level / 5);
        ctx.strokeStyle = isPlayerCardChart ? "rgba(255,255,255,0.16)" : "rgba(148,163,184,0.35)";
        labels.forEach((_, index) => {
            const point = radarPoint(index, labels.length, center, radius);
            ctx.beginPath(); ctx.moveTo(center, center); ctx.lineTo(point.x, point.y); ctx.stroke();
        });
        if (!isPlayerCardChart) {
            ctx.fillStyle = "#1f2937";
            ctx.font = "12px Arial, sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            labels.forEach((label, index) => {
                const point = radarPoint(index, labels.length, center, radius + 34);
                ctx.fillText(label, point.x, point.y);
            });
        }
        ctx.beginPath();
        values.forEach((value, index) => {
            const point = radarPoint(index, values.length, center, radius * value / 100);
            if (index === 0) ctx.moveTo(point.x, point.y); else ctx.lineTo(point.x, point.y);
        });
        ctx.closePath();
        ctx.fillStyle = isPlayerCardChart ? "rgba(56,189,248,0.22)" : "rgba(37,99,235,0.22)";
        ctx.strokeStyle = isPlayerCardChart ? "#67e8f9" : "#2563eb";
        ctx.lineWidth = isPlayerCardChart ? 2.5 : 3;
        ctx.fill(); ctx.stroke();
        ctx.fillStyle = isPlayerCardChart ? "#e0f2fe" : "#2563eb";
        values.forEach((value, index) => {
            const point = radarPoint(index, values.length, center, radius * value / 100);
            ctx.beginPath(); ctx.arc(point.x, point.y, isPlayerCardChart ? 3 : 4, 0, Math.PI * 2); ctx.fill();
        });
        if (!isPlayerCardChart) {
            ctx.font = "bold 13px Arial, sans-serif";
            ctx.textAlign = "left";
            ctx.fillStyle = "#1f2937";
            ctx.fillText(text.you, 18, 24);
        }
    }

    function moveRadarChartIntoPlayerCard() {
        const slot = $("playerCardRadarSlot");
        const chartBox = $("chartBox");
        if (slot && chartBox && chartBox.parentElement !== slot) slot.appendChild(chartBox);
    }

    function initializeUserPhotoPreview() {
        const image = $("userPhotoPreview");
        if (!image) return;
        image.src = createDefaultUserPhotoSvg();
    }

    function createDefaultUserPhotoSvg() {
        const svg = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 320">
                <defs>
                    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
                        <stop offset="0" stop-color="#dbeafe"/>
                        <stop offset="1" stop-color="#94a3b8"/>
                    </linearGradient>
                </defs>
                <rect width="240" height="320" fill="url(#bg)"/>
                <circle cx="120" cy="104" r="46" fill="#f8fafc"/>
                <path d="M52 260c10-60 45-92 68-92s58 32 68 92" fill="#1e3a8a"/>
                <path d="M86 210h68l-14 70h-40z" fill="#2563eb"/>
                <text x="120" y="296" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#fff">PHOTO</text>
            </svg>
        `;
        return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function handleUserPhotoUpload(event) {
        const file = event.target.files && event.target.files[0];
        const image = $("userPhotoPreview");
        if (!file || !image) return;
        const reader = new FileReader();
        reader.onload = () => { image.src = String(reader.result || ""); };
        reader.readAsDataURL(file);
    }

    function handlePlayerNameInput(event) {
        const nameElement = $("playerCardName");
        if (!nameElement) return;
        const value = normalizeCell(event.target.value);
        nameElement.textContent = value || "YOUR NAME";
    }

    function drawRadarShape(ctx, sides, center, radius) {
        ctx.beginPath();
        for (let index = 0; index < sides; index++) {
            const point = radarPoint(index, sides, center, radius);
            if (index === 0) ctx.moveTo(point.x, point.y); else ctx.lineTo(point.x, point.y);
        }
        ctx.closePath(); ctx.stroke();
    }

    function radarPoint(index, total, center, radius) {
        const angle = -Math.PI / 2 + (Math.PI * 2 * index / total);
        return { x: center + Math.cos(angle) * radius, y: center + Math.sin(angle) * radius };
    }

    function createAbilityHtml(scores) {
        return Object.entries(scores).map(([name, value]) => {
            const score = clamp(value);
            return `<div class="ability-item"><div class="ability-name"><span>${escapeHtml(name)}</span><span>${score}</span></div><div class="ability-bar"><div class="ability-bar-fill" style="width:${score}%"></div></div></div>`;
        }).join("");
    }

    function createPlayerStatHtml(scores) {
        return ["オフェンス", "ドリブル", "フィジカル", "ディフェンス", "足の速さ", "パス"].map((name) => {
            const value = clamp(scores[name] || 0);
            return `<div class="player-stat-item"><span class="player-stat-label">${escapeHtml(name)}</span><span class="player-stat-value">${value}</span></div>`;
        }).join("");
    }

    function resetRadarChartLocation() {
        const quizArea = $("quizArea");
        const reviewArea = $("reviewArea");
        const chartBox = $("chartBox");
        if (!quizArea || !reviewArea || !chartBox) return;
        if (chartBox.parentElement !== quizArea) quizArea.insertBefore(chartBox, reviewArea);
    }

    function createOrderedDetailScores(scores) {
        const orderedScores = {};
        const abilities = abilityMeasurementData?.abilities || ability20Names;
        abilities.forEach((item) => orderedScores[item] = clamp(scores[item] || 0));
        return orderedScores;
    }

    function createReviewCardHtml() {
        const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSdOeGtQ2z28QWagcLrtyNbJnNXXWF46c7apcg_dXMol1XE8rA/viewform?usp=publish-editor";
        return `
            <div class="review-card">
                <h3>⭐ レビューにご協力ください</h3>
                <p>診断の感想や評価を送ってもらえると、今後の改善に役立ちます。<br>30秒ほどで終わるので、ぜひお願いします！</p>
                <a class="review-card__button" href="${escapeAttribute(formUrl)}" target="_blank" rel="noopener noreferrer">レビューを書く</a>
            </div>
        `;
    }

    function showReviewArea() {
        const reviewArea = $("reviewArea");
        if (!reviewArea) return;
        reviewArea.innerHTML = createReviewCardHtml();
        reviewArea.classList.add("is-visible");
    }

    function hideReviewArea() {
        const reviewArea = $("reviewArea");
        if (!reviewArea) return;
        reviewArea.innerHTML = "";
        reviewArea.classList.remove("is-visible");
    }

    function toggleDetailAbilities() {
        const detailArea = $("detailAbilityArea");
        const toggleButton = $("detailToggleBtn");
        if (!detailArea || !toggleButton) return;
        const isOpen = detailArea.classList.contains("is-open");
        detailArea.classList.toggle("is-open", !isOpen);
        toggleButton.textContent = isOpen ? "細かい能力を見る" : "細かい能力を閉じる";
    }

    function findPersonalityType(key) {
        return personalityTypes.find((type) => type.typeName === key) || personalityTypes.find((type) => type.key === key) || personalityTypes.find((type) => type.axes.join(" \u00d7 ") === key) || null;
    }

    function clamp(value) { return Math.max(0, Math.min(100, Math.round(Number(value) || 0))); }
    function normalizeAbilityName(value) {
        const name = normalizeCell(value);
        return abilityNameAliases[name] || name;
    }
    function normalizeImagePath(path) { return normalizeCell(path).replace(/^\/+/, ""); }
    function resolveDisplayImagePath(imagePath) { return imagePath; }
    function getFallbackImagePath(imagePath) { return imagePath && !imagePath.includes("/") ? `images/${imagePath}` : ""; }

    function attachCharacterImageError(imagePath, displayImagePath) {
        const image = $("characterImage");
        if (!image || !imagePath) return;
        image.addEventListener("error", () => {
            const fallbackImagePath = getFallbackImagePath(imagePath);
            if (fallbackImagePath && image.dataset.fallbackTried !== "1") {
                image.dataset.fallbackTried = "1";
                console.log(`${text.imageFail}: image_path=${imagePath} / src=${displayImagePath}. fallback=${fallbackImagePath}`);
                image.src = fallbackImagePath;
                return;
            }
            console.log(`${text.imageFail}: image_path=${imagePath} / src=${image.src || displayImagePath}`);
            image.style.display = "none";
            const message = $("imageErrorMessage");
            if (message) {
                message.style.display = "block";
                message.textContent = `${text.imageFail}: ${imagePath}`;
            }
        });
    }

    function escapeHtml(value) {
        return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function escapeAttribute(value) { return escapeHtml(value).replace(/`/g, "&#96;"); }

    window.startDiagnosis = startDiagnosisFlow;
    window.startAbilityMeasurement = startAbilityMeasurementFlow;
    window.showHomeView = showHomeView;
    window.showPlaystyleTop = showPlaystyleTop;
    window.showAbilityMeasurementTop = showAbilityMeasurementTop;
    window.showAllDiagnosisComingSoon = showAllDiagnosisComingSoon;
    window.selectAbilityPosition = selectAbilityPosition;
    window.selectAbilityPlaystyle = selectAbilityPlaystyle;
    window.selectAdditionalAnswer = selectAdditionalAnswer;
    window.submitAbilityAdditionalStep = submitAbilityAdditionalStep;
    window.toggleAbilitySelect = toggleAbilitySelect;
    window.submitAbilityStrengthStep = submitAbilityStrengthStep;
    window.submitAbilityWeaknessStep = submitAbilityWeaknessStep;
    window.selectSelfRating = selectSelfRating;
    window.submitAbilitySelfRatingStep = submitAbilitySelfRatingStep;
    window.selectChoiceFromButton = selectChoiceFromButton;
    window.submitPlaystylePage = submitPlaystylePage;
    window.backQuestion = backQuestionFlow;
    window.returnToQuestions = returnToQuestionsFlow;
    window.finish = finishDiagnosisFlow;
    window.toggleDetailAbilities = toggleDetailAbilities;
    window.handleUserPhotoUpload = handleUserPhotoUpload;
    window.handlePlayerNameInput = handlePlayerNameInput;
    window.showHomeTypeDetail = showHomeTypeDetail;
    window.closeHomeTypeDetail = closeHomeTypeDetail;
    window.handleHomeTypeImageError = handleHomeTypeImageError;
})();
</script>
