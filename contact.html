<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ | サッカー診断サイト</title>
<style>
*, *::before, *::after{box-sizing:border-box;}
html,body{width:100%;max-width:100%;margin:0;overflow-x:hidden;}
body{font-family:Arial,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;color:#0f172a;background:#f4f7fb;line-height:1.9;}
.legal-page{width:min(100%,920px);margin:0 auto;padding:48px 20px 28px;}
.legal-card{background:rgba(255,255,255,0.94);border:1px solid #e2e8f0;border-radius:24px;box-shadow:0 14px 34px rgba(15,23,42,0.1);padding:38px 34px;text-align:center;}
.legal-title{margin:0 0 10px;font-size:clamp(30px,6vw,46px);font-weight:900;line-height:1.25;color:#0f172a;}
.legal-lead{margin:0 auto 24px;max-width:620px;color:#475569;font-weight:700;}
.contact-placeholder{margin:0 auto;padding:24px;border-radius:18px;background:#eff6ff;border:1px solid #bfdbfe;color:#1e3a8a;font-size:18px;font-weight:900;}
.contact-note{margin:18px auto 0;max-width:620px;color:#64748b;font-size:14px;font-weight:700;text-align:left;}
.legal-footer{margin-top:26px;text-align:center;color:#64748b;font-size:13px;font-weight:700;}
.legal-footer__links{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:12px;}
.legal-footer a{color:#2563eb;font-weight:900;text-decoration:none;}
.legal-footer a:hover{text-decoration:underline;}
@media(max-width:600px){.legal-page{padding:28px 12px 20px;}.legal-card{padding:26px 18px;border-radius:18px;}.contact-placeholder{font-size:16px;padding:20px 14px;}.legal-footer__links{gap:10px 12px;}}
</style>
</head>
<body>
<main class="legal-page">
    <article class="legal-card">
        <h1 class="legal-title">お問い合わせ</h1>
        <p class="legal-lead">本サイトへのお問い合わせはこちらのページから受け付ける予定です。</p>
        <div class="contact-placeholder">お問い合わせフォームは準備中です</div>
        <p class="contact-note">今後、問い合わせ用のGoogleフォームを設定できるように、このページを用意しています。</p>
    </article>

    <footer class="legal-footer">
        <nav class="legal-footer__links" aria-label="フッターリンク">
            <a href="privacy.html">プライバシーポリシー</a>
            <a href="disclaimer.html">免責事項</a>
            <a href="operator.html">運営者情報</a>
            <a href="contact.html">お問い合わせ</a>
        </nav>
        <a href="index.html">トップページへ戻る</a>
    </footer>
</main>
</body>
</html>
